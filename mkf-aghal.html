*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0A0A;font-family:'Nunito',sans-serif;overflow:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0A0A0A;}
::-webkit-scrollbar-thumb{background:#272727;border-radius:2px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.offer-track{display:flex;animation:scrollLeft 25s linear infinite;will-change:transform;}
.offer-track:hover,.offer-track:active{animation-play-state:paused;}
.screen{animation:fadeIn 0.25s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 30px #FF520020;transition:all 0.2s;}
.btn-hover:hover{opacity:0.9;transform:scale(0.98);transition:all 0.15s;}
.badge-pop{animation:popIn 0.3s ease forwards;}
input::placeholder{color:#444;}
textarea::placeholder{color:#444;}
@media print{
  body *{visibility:hidden;}
  #print-receipt,#print-receipt *{visibility:visible;}
  #print-receipt{position:fixed;top:0;left:0;width:100%;z-index:9999;background:#fff;}
}
.sidebar{transition:width 0.35s cubic-bezier(.4,0,.2,1),opacity 0.3s ease,box-shadow 0.3s;overflow:hidden;height:100%;}
.sidebar.open{width:220px;opacity:1;box-shadow:4px 0 30px #0006;}
.sidebar.closed{width:0px;opacity:0;}
.toggle-btn:hover{background:#FF520033!important;}
.toggle-btn{transition:background 0.15s;}
@media(max-width:700px){
  .mob-col1{grid-template-columns:1fr!important;}
  .mob-col2{grid-template-columns:1fr 1fr!important;}
  .mob-col3{grid-template-columns:repeat(3,1fr)!important;}
  .mob-stack{flex-direction:column!important;}
  .mob-hide{display:none!important;}
}

const {useState,useEffect,useRef,useCallback}=React;

function useIsMobile(){
  const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:800);
  useEffect(function(){
    var h=function(){setW(window.innerWidth);};
    window.addEventListener('resize',h);
    return function(){window.removeEventListener('resize',h);};
  },[]);
  return w<700;
}

function useLSState(key,def){
  const[val,setVal]=useState(function(){
    try{
      var s=localStorage.getItem(key);
      return s?JSON.parse(s):def;
    }catch(e){return def;}
  });
  function setter(v){
    setVal(function(prev){
      var next=typeof v==='function'?v(prev):v;
      try{localStorage.setItem(key,JSON.stringify(next));}catch(e){}
      return next;
    });
  }
  return [val,setter];
}

function parseOptPrice(opt){
  var m=opt.match(/\+(\d+)/);
  return m?parseInt(m[1]):0;
}

function calcItemPrice(basePrice,opts){
  var extra=0;
  if(opts&&opts.length){
    opts.forEach(function(o){extra+=parseOptPrice(o);});
  }
  return basePrice+extra;
}

const MIN_ORDER=200;
function getActiveOffers(){
  try{
    var offers=JSON.parse(localStorage.getItem('mkf_offers')||'[]');
    var now=new Date();
    return offers.filter(function(o){
      if(!o.active) return false;
      if(o.fromDate&&new Date(o.fromDate)>now) return false;
      if(o.endDate&&new Date(o.endDate+'T23:59:59')<now) return false;
      return true;
    }).map(function(o){
      /* Load image from separate key */
      if(o.hasImg){
        try{ var img=localStorage.getItem('mkf_offerimg_'+o.id); if(img) o.imgData=img; }catch(e){}
      }
      return o;
    });
  }catch(e){return [];}
}
function getTagline(){ try{var s=JSON.parse(localStorage.getItem('mkf_settings')||'{}');return s.tagline||'Taste Jo Dil Kare!';}catch(e){return 'Taste Jo Dil Kare!';} }

function getHours(){ try{var h=JSON.parse(localStorage.getItem('mkf_hours')||'null');return h||{open:true,from:'08:00',to:'23:00',msg:''};} catch(e){return {open:true,from:'08:00',to:'23:00',msg:''};} }
function isRestaurantOpen(){
  var h=getHours();
  /* Manual override: if open is explicitly false/0/"false", closed */
  if(h.open===false||h.open===0||h.open==='false') return false;
  var now=new Date();
  var cur=now.getHours()*60+now.getMinutes();
  var from=parseInt((h.from||'08:00').split(':')[0])*60+parseInt((h.from||'08:00').split(':')[1]||0);
  var to=parseInt((h.to||'23:00').split(':')[0])*60+parseInt((h.to||'23:00').split(':')[1]||0);
  return cur>=from&&cur<=to;
}

function decodeHtmlEntities(str){
  if(!str) return str;
  /* Only decode if it contains & - avoids touching real emoji strings */
  if(str.indexOf('&')===-1) return str;
  try{
    var txt=document.createElement('textarea');
    txt.innerHTML=str;
    return txt.value;
  }catch(e){ return str; }
}

function loadMenuItems(){
  try{
    var saved=localStorage.getItem('mkf_menu');
    if(saved){
      var ownerMenu=JSON.parse(saved);
      if(ownerMenu&&ownerMenu.length>0){
        /* Filter unavailable items and map to customer format */
        return ownerMenu.filter(function(i){return i.avail!==false;}).map(function(i){
          /* Merge with DEFAULT_ITEMS for rich fields not stored in owner menu */
          var def=DEFAULT_ITEMS.find(function(d){return String(d.id)===String(i.id)||d.name===i.name;});
          /* Load image from separate key */
          var imgData=null;
          if(i.hasImg||i.imgData){
            try{ var stored=localStorage.getItem('mkf_img_'+i.id); if(stored) imgData=stored; }catch(e){}
            if(!imgData&&i.imgData) imgData=i.imgData;
          }
          return {
            id: i.id,
            cat: i.cat||'Other',
            name: i.name,
            price: i.price,           /* Always use owner price */
            prep: (def&&def.prep)||i.prep||'10',
            rating: (def&&def.rating)||4.8,
            desc: i.desc||(def&&def.desc)||i.name,
            emoji: decodeHtmlEntities(i.emoji||'')||(def&&def.emoji)||'\uD83C\uDF54',
            allergens: (def&&def.allergens)||[],
            popular: !!(i.pop||i.popular),
            opts: (def&&def.opts)||[],
            img: imgData?null:((def&&def.img)||null),
            imgData: imgData
          };
        });
      }
    }
  }catch(e){}
  return DEFAULT_ITEMS;
}

/* Live ITEMS — reads from localStorage each time menu is accessed */
var ITEMS=loadMenuItems();

/* Rebuild ITEMS and CATS from owner menu whenever needed */
function refreshMenu(){
  ITEMS=loadMenuItems();
  /* Rebuild CATS dynamically from current items */
  var seen={All:true};
  var cats=['All'];
  ITEMS.forEach(function(i){
    if(i.cat&&!seen[i.cat]){seen[i.cat]=true;cats.push(i.cat);}
  });
  /* Maintain preferred order */
  var preferred=['All','Burgers','Pizza','Chicken Broast','Combos','Sides','Drinks','Cold Drinks','Deals'];
  var ordered=preferred.filter(function(c){return seen[c];});
  cats.forEach(function(c){if(ordered.indexOf(c)===-1)ordered.push(c);});
  CATS.length=0;
  ordered.forEach(function(c){CATS.push(c);});
}

var CATS=function(){
  var seen={All:true};
  var cats=['All'];
  ITEMS.forEach(function(i){
    if(i.cat&&!seen[i.cat]){seen[i.cat]=true;cats.push(i.cat);}
  });
  var preferred=['All','Burgers','Pizza','Chicken Broast','Combos','Sides','Drinks','Cold Drinks','Deals'];
  var ordered=preferred.filter(function(c){return seen[c];});
  cats.forEach(function(c){if(ordered.indexOf(c)===-1)ordered.push(c);});
  return ordered;
}();

/* ── LOYALTY POINTS ── */
function getLoyalty(){ try{return JSON.parse(localStorage.getItem('mkf_loyalty')||'{"points":0,"total":0,"referralCode":""}');} catch(e){return {points:0,total:0,referralCode:""};} }
function saveLoyalty(l){ try{localStorage.setItem('mkf_loyalty',JSON.stringify(l));}catch(e){} }
function generateReferralCode(){
  var saved=getLoyalty();
  if(!saved.referralCode){
    var code='MKF'+Math.random().toString(36).substr(2,5).toUpperCase();
    saved.referralCode=code;
    saveLoyalty(saved);
  }
  return saved.referralCode;
}
function earnPoints(orderTotal){
  var l=getLoyalty();
  var pts=Math.floor(orderTotal/LOYALTY_RATE);
  l.points=(l.points||0)+pts;
  l.total=(l.total||0)+orderTotal;
  saveLoyalty(l);
  return pts;
}
function redeemPoints(){
  var l=getLoyalty();
  if((l.points||0)>=LOYALTY_REDEEM){
    l.points-=LOYALTY_REDEEM;
    saveLoyalty(l);
    return LOYALTY_REDEEM_VAL;
  }
  return 0;
}
function applyReferralCode(code){
  var myRef=generateReferralCode();
  if(code.toUpperCase()===myRef) return {valid:false,msg:"You cannot use your own referral code"};
  /* Check if already used referral */
  var l=getLoyalty();
  if(l.usedReferral) return {valid:false,msg:"You have already used a referral code"};
  l.usedReferral=true;
  saveLoyalty(l);
  return {valid:true,discount:REFERRAL_DISCOUNT,msg:"Referral code applied! Rs "+REFERRAL_DISCOUNT+" off"};
}

const ROUTE=[{x:295,y:180},{x:295,y:125},{x:195,y:125},{x:195,y:72},{x:90,y:72},{x:60,y:42}];
function lerp(a,b,t){return a+(b-a)*t;}
function getDPos(p){
  if(p>=1)return ROUTE[ROUTE.length-1];
  var s=ROUTE.length-1,sp=p*s,i=Math.floor(sp),t=sp-i;
  return{x:lerp(ROUTE[i].x,ROUTE[i+1].x,t),y:lerp(ROUTE[i].y,ROUTE[i+1].y,t)};
}

/* ── MAP ── */
function MapSim(props){
  var progress=props.progress;
  var dp=getDPos(progress);
  var covPts=[];
  var s=ROUTE.length-1,sp=progress*s,ci=Math.floor(sp);
  for(var i=0;i<=ci&&i<ROUTE.length;i++)covPts.push(ROUTE[i]);
  covPts.push(dp);
  var fp=ROUTE.map(function(p,i){return (i===0?"M":"L")+p.x+","+p.y;}).join(" ");
  var cp=covPts.map(function(p,i){return (i===0?"M":"L")+p.x+","+p.y;}).join(" ");
  return (
    <div style={{background:"#0D1117",borderRadius:18,overflow:"hidden",border:"1px solid "+C.border,position:"relative"}}>
      <svg width="100%" viewBox="0 0 360 220" style={{display:"block"}}>

        {[60,120,180,240,300].map(function(x){return <rect key={x} x={x-4} y={0} width={x%120===0?10:6} height={220} fill="#161B22"/>;} )}
        {[42,84,126,168].map(function(y){return <rect key={y} x={0} y={y-3} width={360} height={y%84===0?9:5} fill="#161B22"/>;} )}
        <path d={fp} fill="none" stroke="#30363D" strokeWidth={5} strokeDasharray="8 6" strokeLinecap="round"/>
        <path d={cp} fill="none" stroke={C.orange} strokeWidth={5} strokeLinecap="round" strokeLinejoin="round" style={{filter:"drop-shadow(0 0 8px "+C.orange+")"}}/>
        <circle cx={295} cy={180} r={18} fill={C.orange} opacity={0.95}/>
        <text x={295} y={187} textAnchor="middle" fontSize={14}>{"\uD83C\uDF54"}</text>
        <circle cx={60} cy={42} r={18} fill={C.green} opacity={0.95}/>
        <text x={60} y={49} textAnchor="middle" fontSize={13}>{"\uD83C\uDFE0"}</text>
        <circle cx={dp.x} cy={dp.y} r={24} fill={C.blue} opacity={0.18}/>

        <text x={dp.x} y={dp.y+6} textAnchor="middle" fontSize={12}>{"\uD83C\uDFCD\uFE0F"}</text>
      </svg>

  );

function CartScreen(props){
  rebuildC();
  var cart=props.cart,updateQty=props.updateQty,setScreen=props.setScreen,goMenu=props.goMenu;
  var cartDineIn=props.dineInTable||""; var cartIsDineIn=cartDineIn!=="";
  var sub=cart.reduce(function(s,i){return s+calcItemPrice(i.item.price,i.opts)*i.qty;},0);
  /* Check for pending deal discount */
  var pendingDeal=null;
  try{var pd=localStorage.getItem('mkf_pending_deal'); if(pd) pendingDeal=JSON.parse(pd);}catch(e){}
  var dealDiscount=0;
  if(pendingDeal){
    dealDiscount=pendingDeal.offerType==='percent'?Math.round(sub*pendingDeal.value/100):Math.min(pendingDeal.discount,sub);
  }
  var _cartCfg={};try{_cartCfg=JSON.parse(localStorage.getItem('mkf_settings')||'{}')}catch(e){}
  var _cartGstPct=parseFloat(_cartCfg.gst)||17;
  var _cartDiscounted=sub-dealDiscount;
  var _cartGst=Math.round(_cartDiscounted*_cartGstPct/100);
  var _cartDelivery=cartIsDineIn?0:50;
  var total=_cartDiscounted+_cartGst+_cartDelivery;
  if(cart.length===0)return (
    <div className="screen" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center"}}>
      <div style={{fontSize:80,marginBottom:16}}>{"\uD83D\uDED2"}</div>

      <p style={{color:C.muted,fontSize:14,marginBottom:28,lineHeight:1.7}}>Go explore our amazing menu!</p>
      <button className="btn-hover" onClick={function(){goMenu();}} style={{background:"linear-gradient(135deg,"+C.orange+","+C.gold+")",border:"none",borderRadius:14,padding:"14px 36px",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>BROWSE MENU</button>

  );
  var minOk=sub>=MIN_ORDER;
  return (
    <div className="screen" style={{flex:1,display:"flex",overflow:"hidden"}} >
      <div style={{flex:1,overflowY:"auto",borderRight:"1px solid "+C.border}}>
        <div style={{padding:"16px 20px 14px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12}}>
          <button onClick={function(){goMenu();}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:11,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}><Ico n="arrow" size={16} color={C.white}/></button>
          <div>
            <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.white,letterSpacing:1.5,margin:0}}>YOUR ORDER</h2>
            <p style={{color:C.muted,fontSize:12,margin:0}}>{cart.reduce(function(s,i){return s+i.qty;},0)} items</p>

          {cart.map(function(ci,idx){
            var linePrice=calcItemPrice(ci.item.price,ci.opts);
            return (
              <div key={idx} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:"1px solid "+C.border}}>
                <div style={{width:58,height:58,background:C.orange+"22",borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0,overflow:"hidden"}}>
                  {ci.item.imgData

  var[time,setTime]=useState("asap");

  var[showAddrList,setShowAddrList]=useState(false);

      var pd=localStorage.getItem('mkf_pending_deal');
      if(pd){
        var pdo=JSON.parse(pd);
        var dv=pdo.offerType==='percent'?{type:'percent',val:pdo.value,label:pdo.label+' ('+pdo.value+'% off)'}:{type:'fixed',val:pdo.discount,label:pdo.label+' (-Rs '+pdo.discount+')'};
        setPromoApplied(dv);
      }
    }catch(e){}
  },[]);
  var[promoErr,setPromoErr]=useState("");
  var[redeemLoyalty,setRedeemLoyalty]=useState(false);
  var[referralApplied,setReferralApplied]=useState(null);

  var canRedeemLoyalty=(loyaltyData.points||0)>=LOYALTY_REDEEM;

  var discount=0;

    else discount=Math.min(promoApplied.val,sub);
  }
  if(redeemLoyalty&&canRedeemLoyalty) discount+=LOYALTY_REDEEM_VAL;
  if(referralApplied) discount+=referralApplied.discount;

  var _gstPctCO=parseFloat(_cfg.gst)||17;

      setPromoApplied(dVal);

/* ── TRACKING SCREEN ── */
function TrackingScreen(props){
  rebuildC();
  var setScreen=props.setScreen,order=props.order,goMenu=props.goMenu;
  var[step,setStep]=useState(0);
  var[progress,setProgress]=useState(0);
  var[eta,setEta]=useState(28);
  var[elapsed,setElapsed]=useState(0);
  /* Live elapsed timer */
  useEffect(function(){
    var t=setInterval(function(){
      if(order&&order.timestamp) setElapsed(Math.floor((Date.now()-order.timestamp)/60000));
    },30000);
    if(order&&order.timestamp) setElapsed(Math.floor((Date.now()-order.timestamp)/60000));
    return function(){clearInterval(t);};
  },[order]);
  var[cancelled,setCancelled]=useState(false);
  var[showCancel,setShowCancel]=useState(false);
  var[ownerStatus,setOwnerStatus]=useState("pending");
  var[ownerRejected,setOwnerRejected]=useState(false);
  var statusToStep={pending:0,confirmed:1,preparing:2,ready:3,picked_up:4,delivered:4};
  /* Poll localStorage for owner status changes */
  useEffect(function(){
    if(!order)return;
    var poll=setInterval(function(){
      try{
        var orders=JSON.parse(localStorage.getItem("mkf_orders")||"[]");
        var found=orders.find(function(o){return o.id===order.id;});
        if(found){
          if(found.ownerStatus==="rejected"){setOwnerRejected(true);clearInterval(poll);return;}
          var newStep=statusToStep[found.ownerStatus]||0;
          setOwnerStatus(found.ownerStatus);
          setStep(newStep);
          setProgress(Math.min(1,newStep/4));
          setEta(Math.max(0,28-newStep*7));
          if(found.ownerStatus==="delivered"){clearInterval(poll);}
        }
      }catch(e){}
    },2000);
    return function(){clearInterval(poll);};
  },[order]);
  var cur=STEPS[step];
  var done=ownerStatus==="delivered";
  var canCancel=!cancelled&&(ownerStatus==='pending'||ownerStatus==='confirmed');
  var cancelMsg=ownerStatus==='preparing'?'Kitchen is already preparing your order':ownerStatus==='ready'||ownerStatus==='picked_up'?'Order is on its way — too late to cancel':ownerStatus==='delivered'?'Order already delivered':cancelled?'Order was cancelled':'';
  if(ownerRejected)return (
    <div className="screen" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center"}}>
      <div style={{fontSize:80,marginBottom:16}}>{"\uD83D\uDE1E"}</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:34,color:C.red,letterSpacing:2,margin:"0 0 12px"}}>ORDER REJECTED</h2>
      <p style={{color:C.muted,fontSize:14,marginBottom:28,lineHeight:1.7}}>Sorry, MKF Aghal could not accept<br/>your order at this time.</p>
      <button onClick={function(){goMenu();}} style={{background:"linear-gradient(135deg,"+C.orange+","+C.gold+")",border:"none",borderRadius:14,padding:"14px 32px",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>TRY AGAIN</button>
    </div>
  );
  if(cancelled)return (
    <div className="screen" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center"}}>
      <div style={{fontSize:80,marginBottom:16}}>{"\uD83D\uDE15"}</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.white,letterSpacing:2,margin:"0 0 12px"}}>ORDER CANCELLED</h2>
      <p style={{color:C.muted,fontSize:14,marginBottom:28}}>Your order has been cancelled. No charges applied.</p>
      <button onClick={function(){goMenu();}} style={{background:"linear-gradient(135deg,"+C.orange+","+C.gold+")",border:"none",borderRadius:14,padding:"14px 32px",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>ORDER AGAIN</button>
    </div>
  );
  return (
    <div className="screen" style={{flex:1,overflowY:"auto"}}>
      {showCancel&&(
        <Modal onClose={function(){setShowCancel(false);}} z={400} w={340}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:12}}>{"\u26A0\uFE0F"}</div>
            <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C.white,letterSpacing:1,margin:"0 0 10px"}}>CANCEL ORDER?</h3>
            <p style={{color:C.muted,fontSize:13,margin:"0 0 6px",lineHeight:1.6}}>This order can still be cancelled because the restaurant has not started preparing it yet.</p>
            <p style={{color:C.red,fontSize:11,margin:"0 0 20px",fontWeight:700}}>Once the kitchen starts — cancellation is not possible.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){setShowCancel(false);}} style={{flex:1,background:C.card2,border:"1px solid "+C.border,borderRadius:12,padding:"12px",color:C.white,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Keep Order</button>
              <button onClick={function(){
                /* Final live check before cancelling */
                try{
                  var lo=JSON.parse(localStorage.getItem('mkf_orders')||'[]');
                  var found=lo.find(function(x){return x.id===order.id;});
                  var st=found?found.ownerStatus:'pending';
                  if(st==='preparing'||st==='ready'||st==='picked_up'||st==='delivered'){
                    setShowCancel(false);
                    setOwnerStatus(st);
                    return;
                  }
                }catch(e){}
                setCancelled(true);setShowCancel(false);
              }} style={{flex:1,background:C.red,border:"none",borderRadius:12,padding:"12px",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Yes, Cancel</button>
            </div>
          </div>
        </Modal>
      )}

/* ── HISTORY SCREEN ── */
function HistoryScreen(props){
  rebuildC();
  var setScreen=props.setScreen,history=props.history,deleteOrder=props.deleteOrder,goMenu=props.goMenu,reorder=props.reorder,autoRateId=props.autoRateId;
  var[ratings,setRatings]=useLSState("mkf_ratings",{});
  var[receipt,setReceipt]=useState(null);
  var[delId,setDelId]=useState(null);
  function renderReceiptItems(){
    if(!receipt)return null;
    if(receipt.cartItems&&receipt.cartItems.length>0){
      return receipt.cartItems.map(function(item,i){
        return (
          <div key={i}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"7px 0"}}>
              <div style={{flex:1,paddingRight:8}}>
                <span style={{color:"#111",fontSize:13,fontWeight:600,display:"block"}}>{item.name}</span>
                {item.opts&&item.opts.length>0&&<span style={{color:"#888",fontSize:10}}>{item.opts.join(", ")}</span>}
                <span style={{color:"#888",fontSize:11,display:"block"}}>Qty: {item.qty}</span>
              </div>
              <span style={{color:"#111",fontSize:13,fontWeight:700}}>Rs {(item.price*item.qty).toLocaleString()}</span>
            </div>
            {i<receipt.cartItems.length-1&&<div style={{borderTop:"1px dotted #ddd"}}/>}
          </div>
        );
      });
    }
    return receipt.items.map(function(item,i){return (
      <div key={i}>
        <div style={{padding:"6px 0"}}><span style={{color:"#111",fontSize:13}}>- {item}</span></div>
        {i<receipt.items.length-1&&<div style={{borderTop:"1px dotted #ddd"}}/>}
      </div>
    );});
  }
  var[sharing,setSharing]=useState(false);
  function whatsappShare(){
    if(!receipt||sharing)return;
    var el=document.getElementById("print-receipt");
    if(!el)return;
    setSharing(true);
    html2canvas(el,{scale:2,backgroundColor:"#ffffff",useCORS:true,logging:false}).then(function(canvas){
      canvas.toBlob(function(blob){
        var file=new File([blob],"MKF-Receipt-"+receipt.id+".png",{type:"image/png"});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:"MKF Aghal Receipt "+receipt.id}).then(function(){
            setSharing(false);
          }).catch(function(){
            setSharing(false);
          });
        }else{
          var url=URL.createObjectURL(blob);
          var a=document.createElement("a");
          a.href=url;
          a.download="MKF-Receipt-"+receipt.id+".png";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function(){URL.revokeObjectURL(url);},1000);
          setSharing(false);
        }
      },"image/png");
    }).catch(function(){setSharing(false);});
  }
  return (
    <div className="screen" style={{flex:1,overflowY:"auto"}}>
      {delId&&(
        <Modal onClose={function(){setDelId(null);}} z={400} w={340}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:12}}>{"\uD83D\uDDD1\uFE0F"}</div>
            <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C.white,letterSpacing:1,margin:"0 0 10px"}}>DELETE ORDER?</h3>
            <p style={{color:C.muted,fontSize:13,margin:"0 0 20px",lineHeight:1.6}}>This will permanently remove the order from your history.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){setDelId(null);}} style={{flex:1,background:C.card2,border:"1px solid "+C.border,borderRadius:12,padding:"12px",color:C.white,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Cancel</button>
              <button onClick={function(){deleteOrder(delId);setDelId(null);}} style={{flex:1,background:C.red,border:"none",borderRadius:12,padding:"12px",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Delete</button>
            </div>
          </div>
        </Modal>
      )}
      {receipt&&(
        <div onClick={function(){setReceipt(null);}} style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}} id="print-receipt" style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:360,overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,0.6)"}}>
            <div style={{background:"#FF5200",padding:"18px 20px 14px",textAlign:"center",position:"relative"}}>
              <button onClick={function(){setReceipt(null);}} style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,0.2)",border:"none",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:16}}>x</button>
              <div style={{width:70,height:70,borderRadius:"50%",overflow:"hidden",border:"3px solid rgba(255,255,255,0.8)",background:"#fff",margin:"0 auto 8px",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
                <img src={LOGO_URI} alt="MKF Logo" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
              </div>
              <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"#fff",letterSpacing:2,margin:0}}>MKF AGHAL</h2>
              <p style={{color:"rgba(255,255,255,0.85)",fontSize:11,margin:"2px 0 0"}}>Food Delivery Receipt</p>
              <p style={{color:"rgba(255,255,255,0.7)",fontSize:10,margin:"4px 0 0"}}>{(function(){try{var s=JSON.parse(localStorage.getItem('mkf_settings')||'{}');var ntn=s.ntn||'7654321-0';var fbr=s.fbrpos||'MKF-SWT-001';return 'NTN# '+ntn+' | FBR POS ID: '+fbr;}catch(e){return 'NTN# 7654321-0 | FBR POS ID: MKF-SWT-001';}})()}</p>
            </div>
            <div style={{padding:"16px 20px",fontFamily:"'Nunito',sans-serif"}}>
              {[["ORDER ID",receipt.id],["DATE",receipt.date],["DELIVERY",receipt.time]].map(function(row){return (
                <div key={row[0]} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:"#666",fontSize:12,fontWeight:700}}>{row[0]}</span>
                  <span style={{color:"#111",fontSize:12,fontWeight:800}}>{row[1]}</span>
                </div>
              );})}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{color:"#666",fontSize:12,fontWeight:700}}>STATUS</span>
                <span style={{color:"#22C55E",fontSize:12,fontWeight:800}}>Delivered</span>
              </div>
              <div style={{borderTop:"2px dashed #ddd",marginBottom:8}}/>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"#999",fontSize:10,fontWeight:800,letterSpacing:1}}>ITEM</span>
                <span style={{color:"#999",fontSize:10,fontWeight:800,letterSpacing:1}}>PRICE</span>
              </div>
              {renderReceiptItems()}
              {receipt.note&&(
                <div style={{marginTop:8,background:"#f5f5f5",borderRadius:8,padding:"6px 10px"}}>
                  <p style={{color:"#666",fontSize:10,fontWeight:700,margin:"0 0 2px"}}>NOTE</p>
                  <p style={{color:"#333",fontSize:12,margin:0}}>{receipt.note}</p>
                </div>
              )}
              <div style={{borderTop:"2px dashed #ddd",margin:"10px 0 8px"}}/>
              {(function(){
                var rSub=receipt.subtotal||(receipt.total-(receipt.deliveryFee!=null?receipt.deliveryFee:50)+(receipt.saved||0));
                var rGstPct=receipt.gstPct||17;
                var rGst=receipt.gstAmt||Math.round(rSub*rGstPct/100);
                var rTotal=receipt.total;
                return (
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:"#666",fontSize:12}}>Subtotal</span>
                      <span style={{color:"#111",fontSize:12,fontWeight:600}}>Rs {rSub.toLocaleString()}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:"#666",fontSize:12}}>GST ({rGstPct}%)</span>
                      <span style={{color:"#111",fontSize:12,fontWeight:600}}>Rs {rGst.toLocaleString()}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:"#666",fontSize:12}}>Delivery Fee</span>
                      <span style={{color:"#111",fontSize:12,fontWeight:600}}>Rs {(receipt.deliveryFee!=null?receipt.deliveryFee:50).toLocaleString()}</span>
                    </div>
                    {receipt.saved>0&&(
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{color:"#22C55E",fontSize:12}}>Discount</span>
                        <span style={{color:"#22C55E",fontSize:12,fontWeight:600}}>- Rs {receipt.saved.toLocaleString()}</span>
                      </div>
                    )}
                    <div style={{borderTop:"2px solid #111",paddingTop:8,marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{color:"#111",fontWeight:800,fontSize:14}}>TOTAL PKR</span>
                      <span style={{color:"#FF5200",fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:1}}>Rs {rTotal.toLocaleString()}</span>
                    </div>
                  </div>
                );
              })()}
            </div>
            <div style={{background:"#f9f9f9",padding:"10px 20px 14px",textAlign:"center",borderTop:"1px solid #eee"}}>
              <p style={{color:"#FF5200",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1.2,margin:"0 0 10px"}}>{getTagline()}</p>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={function(){window.print();}} style={{background:"#FF5200",border:"none",borderRadius:9,padding:"9px 20px",color:"#fff",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1,cursor:"pointer"}}>
                  PRINT
                </button>
                <button onClick={whatsappShare} disabled={sharing} style={{background:sharing?"#888":C.blue,border:"none",borderRadius:9,padding:"9px 20px",color:"#fff",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1,cursor:sharing?"not-allowed":"pointer",minWidth:110}}>
                  {sharing?"SAVING...":"SHARE"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div style={{padding:"16px 20px 14px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={function(){setScreen("home");}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:11,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}><Ico n="arrow" size={16} color={C.white}/></button>
        <div>
          <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.white,letterSpacing:2,margin:0}}>ORDER HISTORY</h2>
          <p style={{color:C.muted,fontSize:12,margin:0}}>All your MKF Aghal orders</p>
        </div>
      </div>
      <div style={{padding:"18px 20px 60px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
        {history.length===0&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 0",color:C.muted}}>
            <div style={{fontSize:70,marginBottom:14}}>{"\uD83D\uDCCB"}</div>
            <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.white,letterSpacing:1.5,margin:"0 0 8px"}}>NO ORDERS YET</h3>
            <p style={{fontSize:13,marginBottom:22}}>Place your first order to see it here!</p>
            <button onClick={function(){goMenu();}} style={{background:"linear-gradient(135deg,"+C.orange+","+C.gold+")",border:"none",borderRadius:12,padding:"12px 28px",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,cursor:"pointer"}}>ORDER NOW</button>
          </div>
        )}
        {(function(){
          var liveMap={};
          try{var lo=JSON.parse(localStorage.getItem("mkf_orders")||"[]");lo.forEach(function(o){liveMap[o.id]=o.ownerStatus;});}catch(e){}
          return history.map(function(order){
          var liveStatus=liveMap[order.id]||order.ownerStatus||"pending";
          order=Object.assign({},order,{ownerStatus:liveStatus});
          var r=ratings[order.id]!==undefined?ratings[order.id]:order.rating;
          var isNew=autoRateId===order.id;
          return (
            <div key={order.id} style={{background:C.card,borderRadius:18,padding:18,border:"1px solid "+(isNew?C.orange:C.border),transition:"border-color 0.3s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <p style={{color:C.white,fontWeight:800,fontSize:15,margin:"0 0 2px"}}>{order.id}</p>
                  <p style={{color:C.muted,fontSize:11,margin:0}}>{order.date} - {order.time}</p>
                </div>
                <Tag color={order.ownerStatus==='delivered'?C.green:order.ownerStatus==='rejected'?C.red:order.ownerStatus==='confirmed'||order.ownerStatus==='preparing'?C.orange:C.muted}>{order.ownerStatus==='delivered'?'Delivered':order.ownerStatus==='rejected'?'Rejected':order.ownerStatus==='confirmed'?'Confirmed':order.ownerStatus==='preparing'?'Preparing':order.ownerStatus==='picked_up'?'On the Way':'Pending'}</Tag>
              </div>
              <div style={{background:C.card2,borderRadius:11,padding:"10px 12px",marginBottom:12}}>
                {order.items.map(function(item,i){return <p key={i} style={{color:"#CCC",fontSize:12,margin:"0 0 2px"}}>- {item}</p>;})}
                {order.note&&<p style={{color:C.muted,fontSize:11,marginTop:4,fontStyle:"italic"}}>"{order.note}"</p>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{color:C.orange,fontWeight:800,fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>{fmt(order.total)}</span>
                {order.saved>0&&<span style={{color:C.green,fontSize:11}}>Saved {fmt(order.saved)}</span>}
              </div>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <button onClick={function(){setReceipt(order);}} style={{flex:1,background:C.card2,border:"1px solid "+C.border,borderRadius:10,padding:"9px",color:C.white,fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontFamily:"'Nunito',sans-serif"}}>
                  <Ico n="receipt" size={13} color={C.white}/> Receipt
                </button>
                <button onClick={function(){reorder(order);}} className="btn-hover" style={{flex:1,background:C.orange,border:"none",borderRadius:10,padding:"9px",color:"#000",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontFamily:"'Nunito',sans-serif"}}>
                  <Ico n="refresh" size={13} color="#000"/> Reorder
                </button>
                <button onClick={function(){setDelId(order.id);}} style={{background:C.card2,border:"1px solid "+C.red+"55",borderRadius:10,padding:"9px 12px",color:C.red,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {"\uD83D\uDDD1"}
                </button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:C.muted,fontSize:12}}>Rate:</span>
                <Stars n={r} size={18} onClick={function(s){setRatings(function(prev){var n=Object.assign({},prev);n[order.id]=s;return n;});}}/>
              </div>
            </div>
          );
        });})()}
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  rebuildC();
  var[themeVer,setThemeVer]=useState(0);
  /* expose theme toggle globally so any screen can call it */
  window.__mkfToggleTheme=function(){
    var isLight=document.body.classList.contains("mkf-light");
    document.body.classList.toggle("mkf-light",!isLight);
    try{localStorage.setItem("mkf_app_theme",isLight?"dark":"light");}catch(e){}
    rebuildC();
    setThemeVer(function(v){return v+1;});
  };
  var[screen,setScreen]=useState("home");
  useEffect(function(){ window.__mkfSetScreen=setScreen; },[setScreen]);
  var[dineInTable,setDineInTable]=useState("");
  useEffect(function(){
    window.__mkfSetDineIn=function(t){ setDineInTable(t); window.__mkfCurrentTable=t;
      /* Auto-navigate to menu after table set */
      setTimeout(function(){ if(window.__mkfSetScreen) window.__mkfSetScreen('menu'); },200);
    };
    window.__mkfCurrentTable=dineInTable||"";
    /* Consume any pending table set before React mounted */
    if(window.__mkfPendingTable){
      setDineInTable(window.__mkfPendingTable);
      window.__mkfPendingTable=null;
    }
    var sq=window.location.search||"";
    var tm=sq.match(/[?&]table=([^&]*)/);
    var mm=sq.match(/[?&]mode=([^&]*)/);
    if(mm&&mm[1]==="dinein"&&tm&&tm[1]) setDineInTable(String(parseInt(tm[1])||0));
  },[]);
  var[cart,setCart]=useLSState("mkf_cart",[]);
  var[sidebarOpen,setSidebarOpen]=useState(false);
  var[selectedCat,setSelectedCat]=useState("All");
  var[selectedSearch,setSelectedSearch]=useState("");
  var[history,setHistory]=useLSState("mkf_history",INITIAL_HISTORY);
  var[favorites,setFavorites]=useLSState("mkf_favs",[]);
  var[savedAddresses,setSavedAddresses]=useLSState("mkf_addresses",[]);
  var[currentOrder,setCurrentOrder]=useState(null);
  var[autoRateId,setAutoRateId]=useState(null);
  var[loyaltyPts,setLoyaltyPts]=useState(getLoyalty().points||0);
  var[showLoyalty,setShowLoyalty]=useState(false);

  function handleLoyaltyRedeem(){
    var val=redeemPoints();
    if(val>0){ setLoyaltyPts(getLoyalty().points); }
    setShowLoyalty(false);
  }
  function navToMenu(cat,search){
    setSelectedCat(cat||"All");
    setSelectedSearch(search||"");
    setScreen("menu");
  }
  function goMenu(){
    setSelectedCat("All");
    setSelectedSearch("");
    setScreen("menu");
  }
  function addToCart(item,qty,opts){
    setCart(function(c){
      var ex=c.findIndex(function(ci){return ci.item.id===item.id&&JSON.stringify(ci.opts)===JSON.stringify(opts);});
      if(ex>=0)return c.map(function(ci,i){return i===ex?Object.assign({},ci,{qty:ci.qty+qty}):ci;});
      return c.concat([{item:item,qty:qty,opts:opts}]);
    });
  }
  function updateQty(idx,delta){
    setCart(function(c){return c.map(function(ci,i){return i===idx?Object.assign({},ci,{qty:ci.qty+delta}):ci;}).filter(function(ci){return ci.qty>0;});});
  }
  function placeOrder(details){
    var sub=cart.reduce(function(s,i){return s+calcItemPrice(i.item.price,i.opts)*i.qty;},0);
    var _cfg={};try{_cfg=JSON.parse(localStorage.getItem('mkf_settings')||'{}')}catch(e){}
    var _gstPct=parseFloat(_cfg.gst)||17;
    var _discounted=sub-(details.discount||0);
    var _gstAmt=Math.round(_discounted*_gstPct/100);
    var total=_discounted+_gstAmt+(details.deliveryFee!=null?details.deliveryFee:50);
    var subtotalForReceipt=_discounted;
    var gstForReceipt=_gstAmt;
    var gstPctForReceipt=_gstPct;
    var cartSnap=cart.map(function(ci){return {name:ci.item.name,qty:ci.qty,price:calcItemPrice(ci.item.price,ci.opts),opts:ci.opts||[]};});
    var newOrder={
      id:"ORD-"+Math.floor(1000+Math.random()*8999),
      date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      timestamp:Date.now(),
      total:total,rating:5,
      subtotal:subtotalForReceipt,
      gstAmt:gstForReceipt,
      gstPct:gstPctForReceipt,
      items:cartSnap.map(function(ci){return ci.name+" x"+ci.qty;}),
      cartItems:cartSnap,
      time:"~30 min",
      saved:details.discount||0,
      note:details.note||"",
      deliveryFee:details.deliveryFee!=null?details.deliveryFee:50,
      promoCode:details.promoCode||null,
      customer:{name:details.name||"",phone:details.phone||"",city:details.city||"",village:details.village||"",street:details.street||""},
      payment:details.pay||"cash",
      ownerStatus:"pending",
      type:details.type||"delivery",
      tableNumber:details.tableNumber||"",
    };
    setCurrentOrder(newOrder);
    setHistory(function(h){return [newOrder].concat(h);});
    try{
      var existing=JSON.parse(localStorage.getItem("mkf_orders")||"[]");
      existing.unshift(newOrder);
      localStorage.setItem("mkf_orders",JSON.stringify(existing.slice(0,200)));
    }catch(e){}
    try{localStorage.removeItem('mkf_pending_deal');}catch(e){}
    setCart([]);
    /* Award loyalty points */
    var ptsEarned=earnPoints(total);
    setLoyaltyPts(getLoyalty().points);
    setScreen("confirmation");
    /* Store points earned on order for display */
    newOrder.pointsEarned=ptsEarned;
  }
  function deleteOrder(id){setHistory(function(h){return h.filter(function(o){return o.id!==id;});});}
  function toggleFav(id){setFavorites(function(f){return f.includes(id)?f.filter(function(x){return x!==id;}):f.concat([id]);});}
  function saveAddress(addr){setSavedAddresses(function(a){var exists=a.some(function(x){return x.street===addr.street&&x.phone===addr.phone;});return exists?a:[addr].concat(a).slice(0,5);});}
  function reorder(order){
    if(order.cartItems&&order.cartItems.length>0){
      order.cartItems.forEach(function(ci){
        var item=ITEMS.find(function(i){return i.name===ci.name;});
        if(item)addToCart(item,ci.qty,ci.opts||[]);
      });
    }
    setScreen("cart");
  }
  function handleTrackingDone(){
    setAutoRateId(currentOrder?currentOrder.id:null);
    setScreen("history");
  }
  var cartCount=cart.reduce(function(s,i){return s+i.qty;},0);
  return (
    <div style={{background:C.bg,height:"100vh",display:"flex",overflow:"hidden",fontFamily:"'Nunito',sans-serif",position:"relative"}}>
      {sidebarOpen&&<div onClick={function(){setSidebarOpen(false);}} style={{position:"fixed",inset:0,zIndex:45,background:"#000a",backdropFilter:"blur(2px)"}}/>}
      {showLoyalty&&<LoyaltyModal onClose={function(){setShowLoyalty(false);}} pts={loyaltyPts} onRedeem={handleLoyaltyRedeem}/>}
      <Sidebar screen={screen} setScreen={setScreen} cartCount={cartCount} open={sidebarOpen} onClose={function(){setSidebarOpen(false);}} goMenu={goMenu} loyaltyPts={loyaltyPts} setShowLoyalty={setShowLoyalty}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <TopBar sidebarOpen={sidebarOpen} toggleSidebar={function(){setSidebarOpen(function(o){return !o;});}} screen={screen} cartCount={cartCount} setScreen={setScreen} goMenu={goMenu}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {screen==="home"&&<HomeScreen setScreen={setScreen} navToMenu={navToMenu} goMenu={goMenu} addToCart={addToCart} dineInTable={dineInTable} setDineInTable={setDineInTable}/>}
          {screen==="menu"&&<MenuScreen setScreen={setScreen} addToCart={addToCart} initialCat={selectedCat} initialSearch={selectedSearch} cart={cart} favorites={favorites} toggleFav={toggleFav}/>}
          {screen==="cart"&&<CartScreen cart={cart} updateQty={updateQty} setScreen={setScreen} goMenu={goMenu} dineInTable={dineInTable}/>}
          {screen==="checkout"&&<CheckoutScreen cart={cart} setScreen={setScreen} placeOrder={placeOrder} goMenu={goMenu} savedAddresses={savedAddresses} saveAddress={saveAddress} dineInTable={dineInTable}/>}
          {screen==="confirmation"&&<ConfirmationScreen order={currentOrder} setScreen={setScreen}/>}
          {screen==="tracking"&&<TrackingScreen setScreen={handleTrackingDone} order={currentOrder} goMenu={goMenu}/>}
          {screen==="history"&&<HistoryScreen setScreen={setScreen} history={history} deleteOrder={deleteOrder} goMenu={goMenu} reorder={reorder} autoRateId={autoRateId}/>}
          {screen==="favourites"&&<FavouritesScreen favorites={favorites} toggleFav={toggleFav} addToCart={addToCart} goMenu={goMenu}/>}
        </div>
      </div>
    </div>
  );
}

/* ── PULL TO REFRESH ── */
(function(){
  var startY=0, pulling=false, ind=null;
  function createIndicator(){
    if(ind) return;
    ind=document.createElement('div');
    ind.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);background:#FF5200;color:#000;font-family:Bebas Neue,sans-serif;font-size:13px;letter-spacing:1px;padding:6px 20px;border-radius:0 0 20px 20px;z-index:9999;transition:all .2s;opacity:0;pointer-events:none;';
    ind.textContent='Pull to refresh...';
    document.body.appendChild(ind);
  }
  document.addEventListener('touchstart',function(e){
    /* Only allow pull-to-refresh when page is scrolled to very top */
    var atTop=window.scrollY<=0;
    var el=e.target;
    while(el&&el!==document.body){ if(el.scrollTop>0){atTop=false;break;} el=el.parentElement; }
    if(atTop){ startY=e.touches[0].clientY; pulling=false; }
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(startY===0) return;
    var dy=e.touches[0].clientY-startY;
    if(dy>10){ pulling=true; createIndicator(); }
    if(pulling&&dy>0&&ind){ ind.style.opacity=Math.min(dy/80,1); ind.textContent=dy>60?'Release to go Home...':'Pull down to go Home...'; }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-startY;
    var wasPulling=pulling;
    pulling=false; startY=0;
    if(wasPulling&&dy>60){
      if(ind){ ind.textContent='Going Home...'; ind.style.opacity='1'; }
      refreshMenu();
      window.dispatchEvent(new Event('mkf-hours-changed'));
      if(window.__mkfSetScreen) window.__mkfSetScreen('home');
      setTimeout(function(){if(ind){ind.style.opacity='0';}},800);
    } else { if(ind) ind.style.opacity='0'; }
  },{passive:true});
})();
window.addEventListener('storage', function(e){
  if(e.key==='mkf_menu'){ refreshMenu(); }
  if(e.key==='mkf_settings'){ window.dispatchEvent(new Event('mkf-settings-changed')); }
  if(e.key==='mkf_hours'){
    /* Force React re-render by updating a global flag */
    window._hoursChanged=(window._hoursChanged||0)+1;
    var root=document.getElementById('root');
    if(root&&root._reactRootContainer){ root._reactRootContainer._internalRoot; }
    /* Trigger re-render by dispatching a custom event */
    window.dispatchEvent(new Event('mkf-hours-changed'));
  }
});
/* Poll every 60 seconds to auto-open/close based on time */

    +'<p style="color:#666;font-size:11px;font-weight:800;letter-spacing:1px;margin:0 0 8px">OR ENTER TABLE NUMBER</p>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="qr-num-inp" placeholder="e.g. 5" inputmode="numeric" style="flex:1;background:#1C1C1C;border:1px solid #272727;border-radius:11px;padding:12px;color:#F4EFE8;font-size:18px;text-align:center;outline:none">'
    +'<button id="qr-go-btn" style="background:#FF5200;border:none;border-radius:11px;padding:12px 18px;color:#000;font-family:Bebas Neue,sans-serif;font-size:16px;cursor:pointer">GO</button>'
    +'</div>'
    +'<p id="qr-err-msg" style="color:#EF4444;font-size:12px;font-weight:700;margin:8px 0 0;min-height:16px"></p>'
    +'</div>'
    +'<button id="qr-cancel-btn" style="width:100%;background:transparent;border:1px solid #272727;border-radius:12px;padding:12px;color:#666;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px">Back to Delivery</button>'
    +'</div>';
  document.body.appendChild(ov);
  function closeOv(){var o=document.getElementById('mkf-qr-ov');if(o)o.remove();}
  function doSetTable(t){
    closeOv();
    if(window.__mkfSetDineIn){
      window.__mkfSetDineIn(t);
    } else {
      window.__mkfPendingTable=t;
      var tries=0;
      var poll=setInterval(function(){
        tries++;
        if(window.__mkfSetDineIn){
          clearInterval(poll);
          window.__mkfSetDineIn(window.__mkfPendingTable);
          window.__mkfPendingTable=null;
        } else if(tries>20){ clearInterval(poll); }
      },100);
    }
    /* Navigate to menu after setting table */
    setTimeout(function(){
      if(window.__mkfSetScreen) window.__mkfSetScreen('menu');
    },150);
  }
  document.getElementById('qr-cancel-btn').onclick=closeOv;
  document.getElementById('qr-go-btn').onclick=function(){
    var v=document.getElementById('qr-num-inp').value;
    var t=parseInt(v);
    if(t>=1&&t<=50){doSetTable(String(t));}
    else{document.getElementById('qr-err-msg').textContent='Enter a valid table number (1-50)';}
  };
  document.getElementById('qr-num-inp').onkeydown=function(e){if(e.keyCode===13)document.getElementById('qr-go-btn').onclick();};
  document.getElementById('qr-start-btn').onclick=function(){
    if(!window.jsQR){document.getElementById('qr-err-msg').textContent='Camera QR not available. Enter table number.';return;}
    var vf=document.getElementById('qr-vf');vf.style.display='block';
    var vid=document.getElementById('qr-vid');
    var cvs=document.getElementById('qr-cvs');
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
      vid.srcObject=stream;vid.play();
      var ctx=cvs.getContext('2d');var go=true;
      document.getElementById('qr-stop-btn').onclick=function(){go=false;stream.getTracks().forEach(function(t){t.stop();});vf.style.display='none';};
      function tick(){
        if(!go)return;
        if(vid.readyState===vid.HAVE_ENOUGH_DATA){
          cvs.height=vid.videoHeight;cvs.width=vid.videoWidth;
          ctx.drawImage(vid,0,0,cvs.width,cvs.height);
          var img=ctx.getImageData(0,0,cvs.width,cvs.height);
          var qr=window.jsQR(img.data,img.width,img.height);
          if(qr&&qr.data){
            go=false;stream.getTracks().forEach(function(t){t.stop();});
            var qd=qr.data;
            /* Format 1: MKFTABLE:5 */
            var mkfMatch=qd.match(/^MKFTABLE:(\d+)$/);
            if(mkfMatch&&parseInt(mkfMatch[1])>=1){doSetTable(mkfMatch[1]);return;}
            /* Format 2: URL with ?mode=dinein&table=5 */
            var tm=qd.match(/[?&]table=([^&]*)/);
            var mm=qd.match(/[?&]mode=([^&]*)/);
            if(mm&&mm[1]==='dinein'&&tm&&parseInt(tm[1])>=1){doSetTable(String(parseInt(tm[1])));return;}
            /* Format 3: plain number */
            var plain=parseInt(qd);
            if(plain>=1&&plain<=50){doSetTable(String(plain));return;}
            document.getElementById('qr-err-msg').textContent='Not a valid table QR. Try again.';
            vf.style.display='none';return;
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }).catch(function(){document.getElementById('qr-err-msg').textContent='Camera blocked for local files. Enter table number below.';
    document.getElementById('qr-num-inp').focus();});
  };
};
</script>
</body>
