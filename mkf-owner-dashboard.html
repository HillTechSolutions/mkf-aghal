}

function printTableBill(tableId){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==tableId;});
  if(!t||!t.order) return;
  var s=getSettings();
  var gst=Math.round(t.order.total*s.gst/100);
  recalcTableTotal(t.order);
  var sub2=t.order.subtotal||t.order.total;
  var gst2=Math.round(sub2*s.gst/100);
  var receiptHtml=buildReceiptHTML({
    tableId:tableId,
    items:t.order.items||[],
    subtotal:sub2,
    gst:gst2,
    gstPct:s.gst,
    total:t.order.total,
    customer:t.order.customer||('Table '+tableId),
    payMethod:t.order.payMethod||'cash',
    date:new Date().toLocaleString(),
    amtPaid:t.order.amtPaid,
    change:t.order.change,
    paidTotal:t.order.paidTotal,
    note:t.order.paidTotal&&t.order.paidTotal>t.order.total?'Additional payment session':'',
  });

  /* old receipt replaced by buildReceiptHTML above */
    S._pendingReceiptHtml='<div style="font-family:Nunito,sans-serif;max-width:360px;margin:0 auto;">'+receiptHtml+'</div>';
}

function doPrintTableBill(tableId){
  var pa=document.getElementById('parea');
  pa.innerHTML=S._pendingReceiptHtml||'';
  pa.style.display='block';
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      pa.style.display='none'; pa.innerHTML='';
      S._pendingClearTable=null;
      closeModal();
    },1500);
  },150);
}

/* ========= EVENT DELEGATION ========= */
function bindAll(){
  document.getElementById('content').addEventListener('click', handleClick, true);
  document.getElementById('content').addEventListener('input', handleInput, true);
  var mc=document.getElementById('mcon');
  mc.addEventListener('click', handleClick, true);
  mc.addEventListener('input', handleInput, true);
}

function handleInput(e){
  var t=e.target;
  if(t.dataset.action==='hist-search'){ S.histSearch=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-day-change'){ S.rptDate=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-week-change'){ S.rptWeek=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-month-change'){ S.rptMonth=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-year-change'){ S.rptYear=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-from-change'){ S.rptFrom=t.value; debounceRender(); }
  if(t.dataset.action==='rpt-to-change'){ S.rptTo=t.value; debounceRender(); }
}

var _renderTimer=null;
function debounceRender(){ if(_renderTimer)clearTimeout(_renderTimer); _renderTimer=setTimeout(render,200); }

function handleClick(e){
  var t=e.target;
  while(t&&t!==document.body){
    var a=t.dataset.action, g=t.dataset.group;
    if(g==='livefilter'){ S.liveFilter=t.dataset.filter; render(); return; }
    if(g==='menucat'){ S.menuFilter=t.dataset.cat; render(); return; }
    if(g==='rptmode'){ S.rptMode=t.dataset.mode; S.rptGenerated=false; render(); return; }
    if(g==='range'){ S.reportRange=t.dataset.range; render(); return; }
    if(a==='rpt-day-prev'){ S.rptDate=addDays(S.rptDate||new Date().toISOString().slice(0,10),-1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-day-next'){ S.rptDate=addDays(S.rptDate||new Date().toISOString().slice(0,10),1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-week-prev'){ S.rptWeek=addDays(S.rptWeek||getWeekStart(new Date()),-7); S.rptGenerated=false; render(); return; }
    if(a==='rpt-week-next'){ S.rptWeek=addDays(S.rptWeek||getWeekStart(new Date()),7); S.rptGenerated=false; render(); return; }
    if(a==='rpt-month-prev'){ S.rptMonth=addMonths(S.rptMonth||new Date().toISOString().slice(0,7),-1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-month-next'){ S.rptMonth=addMonths(S.rptMonth||new Date().toISOString().slice(0,7),1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-year-prev'){ S.rptYear=String(parseInt(S.rptYear||new Date().getFullYear())-1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-year-next'){ S.rptYear=String(parseInt(S.rptYear||new Date().getFullYear())+1); S.rptGenerated=false; render(); return; }
    if(a==='rpt-shortcut'){
      var sc=t.dataset.shortcut, now2=new Date(), y=now2.getFullYear();
      if(sc==='last7'){ S.rptFrom=addDays(now2.toISOString().slice(0,10),-6); S.rptTo=now2.toISOString().slice(0,10); }
      if(sc==='last30'){ S.rptFrom=addDays(now2.toISOString().slice(0,10),-29); S.rptTo=now2.toISOString().slice(0,10); }
      if(sc==='last90'){ S.rptFrom=addDays(now2.toISOString().slice(0,10),-89); S.rptTo=now2.toISOString().slice(0,10); }
      if(sc==='thisyear'){ S.rptFrom=y+'-01-01'; S.rptTo=y+'-12-31'; }
      render(); return;
    }
    if(g==='tblcat'){ S._tcat=t.dataset.cat; var tid=t.dataset.tid; closeModal(); setTimeout(function(){showTableItems(tid);},50); return; }
    if(t.dataset.nav){ navigate(t.dataset.nav); return; }
    if(a==='close-modal'){ closeModal(); return; }
    if(a==='accept-all'){ S.orders.filter(function(o){return o.ownerStatus==='pending';}).forEach(function(o){updateSt(o.id,'confirmed');}); sndOK(); refreshOrders(); return; }
    if(a==='prepare-all'){ S.orders.filter(function(o){return o.ownerStatus==='confirmed';}).forEach(function(o){updateSt(o.id,'preparing');}); sndOK(); toast('All moved to Preparing','success'); refreshOrders(); return; }
    if(a==='ready-all'){ S.orders.filter(function(o){return o.ownerStatus==='preparing';}).forEach(function(o){updateSt(o.id,'ready');}); sndOK(); toast('All marked Ready','success'); refreshOrders(); return; }
    if(a==='confirm-payment'){
      var orders_c=readOrders();
      var ord_c=orders_c.find(function(x){return x.id===t.dataset.id;});
      if(ord_c){ ord_c.paymentConfirmed=true; writeOrders(orders_c); S.orders=orders_c; toast('Payment confirmed!','success'); sndOK(); refreshOrders(); }
      return;
    }
    if(a==='accept'){
      var ordA=S.orders.find(function(x){return x.id===t.dataset.id;});
      if(ordA&&ordA.payment&&ordA.payment!=='cash'&&!ordA.paymentConfirmed){
        toast('Please confirm payment received before accepting this order!','warning');
        return;
      }
      updateSt(t.dataset.id,'confirmed'); sndOK();
      refreshOrders(); return;
    }
    if(a==='reject'){
      var rejId=t.dataset.id;
      /* Android blocks confirm() for local files - use inline confirmation */
      var rejOrd=S.orders.find(function(x){return x.id===rejId;});
      var rejName=rejOrd&&rejOrd.customer&&rejOrd.customer.name?rejOrd.customer.name:'Order';
      var mh='<div class="mhead"><h3>&#x274C; REJECT ORDER?</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
      mh+='<div class="mbody" style="text-align:center;padding-top:8px;">';
      mh+='<div style="font-size:48px;margin-bottom:12px;">&#x1F6AB;</div>';
      mh+='<p style="color:var(--white);font-size:15px;font-weight:800;margin:0 0 6px;">'+esc(rejId)+'</p>';
      mh+='<p style="color:var(--muted);font-size:13px;margin:0 0 20px;">Reject this order from '+esc(rejName)+'? This cannot be undone.</p>';
      mh+='<div style="display:flex;gap:10px;">';
      mh+='<button class="btn btn-gh" style="flex:1;" data-action="close-modal">Keep Order</button>';
      mh+='<button class="btn btn-r" style="flex:1;" data-action="confirm-reject" data-id="'+rejId+'">&#x274C; Yes, Reject</button>';
      mh+='</div></div>';
      showModal(mh,'360px'); return;
    }
    if(a==='confirm-reject'){
      updateSt(t.dataset.id,'rejected');
      closeModal();
      toast('Order '+t.dataset.id+' rejected','warning');
      refreshOrders(); return;
    }
    if(a==='advance'){ updateSt(t.dataset.id,t.dataset.next); sndOK(); refreshOrders(); return; }
    if(a==='notify'){ var o2=S.orders.find(function(x){return x.id===t.dataset.id;}); if(o2)sendWA(o2); return; }
    if(a==='show-qr-codes'){
      var baseUrl=window.location.href.split('?')[0].replace('mkf-owner-dashboard.html','mkf-aghal.html');
      var qh='<div class="mhead"><h3>&#x1F4F1; TABLE QR CODES</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
      qh+='<div class="mbody" style="padding-bottom:0;">';
      qh+='<p style="color:var(--muted);font-size:12px;margin:0 0 14px;">Print these QR codes and place them on each table. Customers scan to order directly.</p>';
      qh+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-height:65vh;overflow-y:auto;">';
      getTables().forEach(function(t2){
        var url=baseUrl+'?mode=dinein&table='+t2.id;
        qh+='<div style="background:var(--card2);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--border);">';
        qh+='<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:var(--white);margin-bottom:8px;">TABLE '+t2.id+'</div>';
        qh+='<canvas id="qrc-'+t2.id+'" style="border-radius:8px;"></canvas>';
        qh+='<div style="font-size:10px;color:var(--muted);margin-top:6px;word-break:break-all;">'+url.substring(0,40)+'...</div>';
        qh+='<button class="btn btn-gh btn-sm" style="margin-top:8px;width:100%;" onclick="printQR('+t2.id+')">&#x1F5A8; PRINT</button>';
        qh+='</div>';
      });
      qh+='</div></div>';
      qh+='<div class="mfoot">';
      qh+='<button class="btn btn-g" style="flex:1;" onclick="printAllQR()">&#x1F5A8; PRINT ALL</button>';
      qh+='</div>';
      showModal(qh,'560px');
      /* Generate QR codes after modal renders */
      setTimeout(function(){
        var baseUrl2=window.location.href.split('?')[0].replace('mkf-owner-dashboard.html','mkf-aghal.html');
        getTables().forEach(function(tb){
          var el=document.getElementById('qrc-'+tb.id);
          if(!el) return;
          /* Use simple MKFTABLE:N format - works without knowing the file path */
          var qrData='MKFTABLE:'+tb.id;
          /* Also try full URL if customerAppUrl is set in settings */
          try{
            var cfg=JSON.parse(localStorage.getItem('mkf_settings')||'{}');
            if(cfg.customerAppUrl) qrData=cfg.customerAppUrl+'?mode=dinein&table='+tb.id;
          }catch(e){}
          el.innerHTML='';
          if(window.MKFDrawQR){
            window.MKFDrawQR(el,qrData,130);
          } else {
            el.width=130; el.height=130;
            var ctx=el.getContext('2d');
            ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,130,130);
            ctx.fillStyle='#000000'; ctx.font='bold 14px monospace';
            ctx.textAlign='center'; ctx.fillText('TABLE '+tb.id,65,65);
            ctx.font='10px monospace'; ctx.fillText(qrData,65,85);
          }
        });
      },200); return;
    }
    if(a==='open-table'){ showTableModal(t.dataset.id); return; }
    if(a==='start-table'){
      var cn=document.getElementById('tc-name');
      startTable(t.dataset.id,cn?cn.value:'');
      S._tcat='All';
      closeModal();
      setTimeout(function(){ showTableItems(t.dataset.id); },50);
      return;
    }
    if(a==='table-add-items'){ S._tcat='All'; closeModal(); setTimeout(function(){showTableItems(t.dataset.id);},50); return; }
    if(a==='done-adding'){ closeModal(); setTimeout(function(){showCurrentOrder(t.dataset.id);},50); return; }
    if(a==='back-to-order'){ closeModal(); setTimeout(function(){showCurrentOrder(t.dataset.id);},50); return; }
    if(a==='table-ready'){
      tableReady(t.dataset.id);
      closeModal();
      setTimeout(function(){showPaymentScreen(t.dataset.id);},50);
      return;
    }
    if(a==='clear-table'){ clearTable(t.dataset.id); closeModal(); render(); return; }
    if(a==='reopen-table'){
      var tbls2=getTables();
      var tb2=tbls2.find(function(x){return x.id==t.dataset.id;});
      if(tb2){
        /* Track what was already paid so next payment = new items only */
        tb2.order.paidTotal=tb2.order.paidTotal||tb2.order.total||0;
        tb2.status='occupied';
        tb2.order.paid=false;
        saveTables(tbls2);
      }
      closeModal();
      setTimeout(function(){ showTableItems(t.dataset.id); },50);
      toast('Table reopened — add new items. Previous payment tracked.','info');
      return;
    }
    if(a==='close-and-clear'){ closeModal(); render(); return; }
    if(a==='print-table-bill'){
      var tid_r=t.dataset.id;
      printTableBill(tid_r);
      var s_r=getSettings();
      var rmh='<div class="mhead"><h3>&#x1F9FE; RECEIPT — TABLE '+tid_r+'</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
      rmh+='<div class="mbody" style="padding:0;background:#fff;"><div style="max-height:65vh;overflow-y:auto;">'+(S._pendingReceiptHtml||'')+'</div></div>';
      rmh+='<div class="mfoot" style="background:var(--card);gap:8px;">';
      rmh+='<button class="btn btn-gh" data-action="close-modal">CLOSE</button>';
      rmh+='<button class="btn btn-g" style="flex:1;" onclick="doPrintTableBill(0)">&#x1F5A8;&#xFE0F; PRINT</button>';
      rmh+='</div>';
      closeModal(); setTimeout(function(){ showModal(rmh,'420px'); },50);
      return;
    }
    if(a==='tbl-qty-inc'){
      addItemToTableById(t.dataset.tid, t.dataset.iid);
      closeModal(); setTimeout(function(){showCurrentOrder(t.dataset.tid);},50); return;
    }
    if(a==='tbl-qty-dec'){
      removeItemFromTable(t.dataset.tid, t.dataset.iid);
      closeModal(); setTimeout(function(){showCurrentOrder(t.dataset.tid);},50); return;
    }
    if(a==='set-paymethod'){
      S._payMethod=t.dataset.method;
      document.querySelectorAll('[data-action="set-paymethod"]').forEach(function(b){
        b.className='btn btn-gh btn-sm';
        b.style.flex='1'; b.style.justifyContent='center';
      });
      t.className='btn btn-g btn-sm';
      t.style.flex='1'; t.style.justifyContent='center';
      return;
    }
    if(a==='process-payment'){
      var amtEl=document.getElementById('pay-amount');
      var rawVal=amtEl?amtEl.value.trim():'';
      var tables2=getTables();
      var tbl2=tables2.find(function(x){return x.id==t.dataset.id;});
      if(!tbl2||!tbl2.order) return;
      /* If amount left empty, default to exact total */
      recalcTableTotal(tbl2.order);
      var alreadyPd=tbl2.order.paidTotal||0;
      var amtDue=tbl2.order.total-alreadyPd;
      var amt=rawVal?parseFloat(rawVal)||0:amtDue;
      if(amt<amtDue){ toast('Amount received is less than the amount due (Rs '+Math.round(amtDue).toLocaleString()+')','error'); return; }
      /* Save payment info */
      tbl2.order.payMethod=S._payMethod||'cash';
      tbl2.order.amtPaid=amt;
      tbl2.order.change=amt-amtDue;
      tbl2.order.paidTotal=(alreadyPd+amt); /* running total paid */
      tbl2.order.paid=true;
      tbl2.status='paid';
      saveTables(tables2);
      /* Write completed dine-in order to mkf_orders */
      var dineOrder={
        id:'TBL-'+tbl2.id+'-'+Date.now(),
        type:'dine-in',
        tableId:tbl2.id,
        timestamp:Date.now(),
        total:tbl2.order.total, /* always full bill total */
        payment:tbl2.order.payMethod||'cash',
        ownerStatus:'delivered',
        customer:{name:tbl2.order.customer||('Table '+tbl2.id)},
        items:(tbl2.order.items||[]).map(function(i){return i.name+' x'+i.qty;})
      };
      var allOrders=readOrders();
      allOrders.push(dineOrder);
      writeOrders(allOrders);
      S.orders=allOrders;
      sndOK();
      toast('Payment collected! Rs '+Math.round(amt).toLocaleString(),'success');
      /* Show receipt preview modal */
      printTableBill(t.dataset.id);
      /* Build receipt modal */
      var s5=getSettings();
      var receiptContent=S._pendingReceiptHtml||'';
      var rmh='<div class="mhead"><h3>&#x1F9FE; RECEIPT — TABLE '+tbl2.id+'</h3><button class="mclose" data-action="close-and-clear" data-id="'+t.dataset.id+'">&#x2715;</button></div>';

/* ========= TABLE ACTIONS ========= */
function startTable(id,custName){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==id;});
  if(!t) return;
  t.status='occupied'; t.openedAt=Date.now();
  t.order={items:[],total:0,customer:custName};
  saveTables(tables);
}
function recalcTableTotal(order){
  /* subtotal = sum of items, total = subtotal + GST */
  var s=getSettings();
  var sub=order.items.reduce(function(a,i){return a+i.price*i.qty;},0);
  order.subtotal=sub;
  order.total=sub+Math.round(sub*s.gst/100);
}

function addItemToTableById(tableId,itemId){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==tableId;});
  var menuItem=getMenu().find(function(i){return i.id==itemId;});
  if(!t) return;
  if(!t.order) t.order={items:[],total:0};
  if(menuItem){
    /* Menu item */
    var ex=t.order.items.find(function(x){return x.id==itemId;});
    if(ex) ex.qty++;
    else t.order.items.push({id:menuItem.id,name:menuItem.name,price:menuItem.price,qty:1,emoji:menuItem.emoji||'&#x1F354;'});
  } else {
    /* Custom item — find by id string */
    var ex2=t.order.items.find(function(x){return String(x.id)===String(itemId);});
    if(ex2) ex2.qty++;
  }
  recalcTableTotal(t.order);
  saveTables(tables);
}
function addItemToTable(tableId,itemId){ addItemToTableById(tableId,itemId); }
function removeItemFromTable(tableId,itemId){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==tableId;});
  if(!t||!t.order) return;
  var ex=t.order.items.find(function(x){return String(x.id)===String(itemId);});
  if(!ex) return;
  if(ex.qty>1) ex.qty--;
  else t.order.items=t.order.items.filter(function(x){return String(x.id)!==String(itemId);});
  recalcTableTotal(t.order);
  saveTables(tables);
}
function tableReady(id){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==id;});
  if(t&&t.order&&t.order.items&&t.order.items.length>0){t.status='ready';saveTables(tables);}
}
function clearTable(id){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==id;});
  if(t){t.status='free';t.order=null;t.openedAt=null;saveTables(tables);}
  sndOK(); toast('Table cleared','info');
}
function doPrintReport(){
  var pa=document.getElementById('parea');
  pa.innerHTML=S._pendingReceiptHtml||'';
  pa.style.display='block';
  setTimeout(function(){
    window.print();
    setTimeout(function(){pa.style.display='none';pa.innerHTML='';},1500);
  },200);
}

  var body=document.getElementById('close-report-body');
  if(!body) return;
  S._pendingReceiptHtml='<div style="font-family:Nunito,sans-serif;padding:16px;max-width:400px;margin:0 auto;">'+body.innerHTML+'</div>';
  var pa=document.getElementById('parea');
  pa.innerHTML=S._pendingReceiptHtml;
  pa.style.display='block';
  setTimeout(function(){window.print();setTimeout(function(){pa.style.display='none';pa.innerHTML='';},1500);},200);
}
function calcChange(total){
  var el=document.getElementById('pay-amount');
  var cv=document.getElementById('change-val');
  if(!el||!cv) return;
  var amt=parseFloat(el.value)||0;
  var change=amt-total;
  cv.textContent=fmt(Math.max(0,Math.round(change)));
  cv.style.color=change<0?'var(--red)':'var(--green)';
}

var _prevPIds=[];
function refreshOrders(){
  var orders=readOrders();
  var newP=orders.filter(function(o){return o.ownerStatus==='pending'&&_prevPIds.indexOf(o.id)===-1&&S.seenIds.indexOf(o.id)===-1;});
  if(newP.length>0){ sndNew(); try{if(typeof Notification!=='undefined'&&Notification.permission==='granted') new Notification('New Order! MKF Aghal',{body:newP[0].id+' &mdash; '+fmt(newP[0].total)});}catch(e){} }
  _prevPIds=orders.filter(function(o){return o.ownerStatus==='pending';}).map(function(o){return o.id;});
  S.orders=orders;
  var pb=document.getElementById('pbadge');
  var pc=orders.filter(function(o){return o.ownerStatus==='pending';}).length;
  if(pb){pb.textContent=pc;pb.style.display=pc>0?'inline':'none';}
  if(S.page==='live'||S.page==='dashboard') render();
}

/* Pull-to-refresh */
(function(){
  var startY=0,pulling=false,ind=null;
  function makeInd(){
    if(ind)return;
    ind=document.createElement('div');
    ind.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);background:#FF5200;color:#000;font-family:Bebas Neue,sans-serif;font-size:13px;letter-spacing:1px;padding:6px 22px;border-radius:0 0 20px 20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s;';
    ind.textContent='Pull to refresh...';
    document.body.appendChild(ind);
  }
  document.addEventListener('touchstart',function(e){
    var atTop=window.scrollY<=0;
    var el=e.target;
    while(el&&el!==document.body){ if(el.scrollTop>0){atTop=false;break;} el=el.parentElement; }
    if(atTop){ startY=e.touches[0].clientY; pulling=false; makeInd(); }
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(startY===0)return;
    var dy=e.touches[0].clientY-startY;
    if(dy>10) pulling=true;
    if(pulling&&dy>0&&ind){ind.style.opacity=Math.min(dy/80,1);ind.textContent=dy>60?'Release to go Home...':'Pull down to go Home...';}
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-startY;
    var was=pulling;
    pulling=false; startY=0;
    if(was&&dy>60){
      if(ind){ind.textContent='Going Home...';ind.style.opacity='1';}
      navigate('dashboard');
      refreshOrders();
      setTimeout(function(){if(ind)ind.style.opacity='0';},800);
    } else {if(ind)ind.style.opacity='0';}
  },{passive:true});
})();

</script>
