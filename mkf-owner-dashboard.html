<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MKF Aghal — Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080A;--card:#0E1318;--card2:#141C22;--card3:#1A242C;
  --border:#1E2D38;--green:#10B981;--green2:#34D399;--g3:#065F46;
  --orange:#FF5200;--gold:#F59E0B;--blue:#3B82F6;--blue2:#60A5FA;
  --red:#EF4444;--purple:#8B5CF6;--white:#F1F5F9;--muted:#64748B;--muted2:#94A3B8;
}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--white);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body.light-mode{--bg:#F5F6F8;--card:#FFFFFF;--card2:#F0F1F3;--card3:#E5E7EA;--border:#DDE0E5;--white:#1A1D23;--muted:#7A808A;--muted2:#4A5060;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
input,select,textarea,button{font-family:'Nunito',sans-serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.6)}70%{box-shadow:0 0 0 14px rgba(16,185,129,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
/* TOAST */
#toast-container{position:fixed;top:70px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:12px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:10px;min-width:220px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideInRight .3s ease;pointer-events:all;}
.toast.success{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.toast.error{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);}
.toast.info{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08);}
.toast.warning{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);}
/* KDS */
#kds-overlay{display:none;position:fixed;inset:0;background:#000;z-index:9000;overflow-y:auto;padding:16px;}
#kds-overlay.active{display:block;}
.kds-card{border-radius:14px;padding:14px;margin-bottom:10px;border:2px solid;}
.kds-green{border-color:var(--green);background:rgba(16,185,129,.08);}
.kds-yellow{border-color:var(--gold);background:rgba(245,158,11,.08);}
.kds-red{border-color:var(--red);background:rgba(239,68,68,.1);animation:glow-red 1s ease infinite;}
@keyframes glow-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
/* STAT CARDS ENHANCED */
.scard{position:relative;overflow:hidden;}
.scard .trend{font-size:10px;font-weight:800;margin-top:4px;}
.scard .trend.up{color:var(--green);}
.scard .trend.down{color:var(--red);}
.scard .trend.same{color:var(--muted);}
/* DIVIDER */
hr.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
/* EXPENSE CATEGORY BADGE */
.exp-cat{font-size:9px;font-weight:800;letter-spacing:.5px;padding:3px 8px;border-radius:20px;}
.fade{animation:fadeIn .3s ease;}
.glow{animation:glow 1.5s ease infinite;}
/* NAV */
#nav{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform .3s;}
#nav.hidden{transform:translateX(-220px);}
.nlogo{padding:14px 18px 14px 54px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12;}
.nlogo img{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--orange);object-fit:cover;flex-shrink:0;}
.nlogo-t h2{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--white);letter-spacing:2px;line-height:1;}
.nlogo-t p{font-size:9px;color:var(--green);font-weight:800;letter-spacing:2px;margin-top:2px;}
.nlinks{flex:1;padding:8px 0;overflow-y:auto;}
.nsec{padding:12px 16px 4px;font-size:9px;color:var(--muted);font-weight:800;letter-spacing:2px;}
.nlink{display:flex;align-items:center;gap:10;padding:10px 16px;cursor:pointer;border:none;border-left:3px solid transparent;background:transparent;width:100%;text-align:left;color:var(--muted);font-weight:700;font-size:13px;transition:all .15s;}
.nlink:hover{background:var(--card2);color:var(--white);}
.nlink.active{background:rgba(16,185,129,.1);border-left-color:var(--green);color:var(--white);}
.nlink .ni{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card2);flex-shrink:0;}
.nlink.active .ni{background:var(--g3);}
.nbadge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:900;display:none;}
.nfoot{padding:14px 16px;border-top:1px solid var(--border);}
.nuser{display:flex;align-items:center;gap:10;}
.nava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
/* TOPBAR */
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 12px 0 60px;min-height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:6px;padding-top:6px;padding-bottom:6px;}
#hamburger{position:fixed;top:10px;left:10px;z-index:300;background:var(--card);border:1px solid var(--border);border-radius:9px;width:38px;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;}
#hamburger span{width:16px;height:2px;background:var(--muted2);border-radius:2px;transition:all .3s;}
.tright{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.tbtn{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:5px 9px;color:var(--muted2);font-size:10px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.tbtn:hover{border-color:var(--green);color:var(--white);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
/* MAIN */
#main{margin-left:220px;min-height:100vh;transition:margin .3s;}
#main.full{margin-left:0;}
#content{padding:20px;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.scard.g::before{background:linear-gradient(90deg,var(--green),var(--green2));}
.scard.o::before{background:linear-gradient(90deg,var(--orange),var(--gold));}
.scard.b::before{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.scard.p::before{background:linear-gradient(90deg,var(--purple),#EC4899);}
.scard.r::before{background:linear-gradient(90deg,var(--red),#F97316);}
.sval{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;margin:14px 0 4px;}
.slabel{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.8px;text-transform:uppercase;}
/* BUTTONS */
.btn{border:none;border-radius:9px;padding:9px 16px;font-weight:800;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn:hover{filter:brightness(1.1);transform:scale(.98);}
.btn-g{background:linear-gradient(135deg,var(--green),#059669);color:#fff;}
.btn-o{background:linear-gradient(135deg,var(--orange),var(--gold));color:#000;}
.btn-b{background:var(--blue);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-gh{background:var(--card2);border:1px solid var(--border);color:var(--muted2);}
.btn-gh:hover{border-color:var(--green);color:var(--white);}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px;}
/* INPUTS */
.inp{background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--white);font-size:13px;outline:none;width:100%;transition:border-color .15s;}
.inp:focus{border-color:var(--green);}
.inp::placeholder{color:var(--muted);}
.lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block;}
.fg{margin-bottom:12px;}
/* BADGE */
.badge{display:inline-flex;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:800;}
.bg{background:rgba(16,185,129,.15);color:var(--green2);}
.bo{background:rgba(255,82,0,.15);color:var(--orange);}
.bd{background:rgba(245,158,11,.15);color:var(--gold);}
.bb{background:rgba(59,130,246,.15);color:var(--blue2);}
.br{background:rgba(239,68,68,.15);color:#FCA5A5;}
.bm{background:rgba(100,116,139,.15);color:var(--muted2);}
/* TABLE */
.twrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
thead{background:var(--card2);}
th{padding:10px 14px;font-size:9px;font-weight:900;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap;text-align:left;}
td{padding:11px 14px;font-size:12px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
.mhead{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mhead h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;}
.mbody{padding:18px 20px;}
.mfoot{padding:14px 20px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.mclose{background:var(--card2);border:1px solid var(--border);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;}
/* ORDER CARD */
.ocard{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.ocard.pending{border-color:rgba(245,158,11,.5);}
.ocard.confirmed{border-color:rgba(59,130,246,.5);}
.ocard.preparing{border-color:rgba(255,82,0,.5);}
.ocard.ready{border-color:rgba(16,185,129,.5);}
.ocard.new{animation:glow 1.5s ease infinite;}
/* DINE-IN TABLES */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.tbl{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.tbl:hover{transform:translateY(-2px);}
.tbl.free{border-color:rgba(16,185,129,.3);}
.tbl.occupied{border-color:rgba(255,82,0,.5);background:rgba(255,82,0,.05);}
.tbl.ready{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.05);}
.tbl.paid{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.08);}
/* CHART */
.cbars{display:flex;align-items:flex-end;gap:5px;height:110px;}
.cbar{background:linear-gradient(0deg,var(--g3),var(--green));border-radius:5px 5px 0 0;flex:1;min-width:18px;transition:height .5s;}
.clabels{display:flex;gap:5px;margin-top:6px;}
.clabels span{flex:1;font-size:9px;color:var(--muted);text-align:center;font-weight:700;}
/* TABS */
.tabs{display:flex;gap:3px;background:var(--card2);border-radius:11px;padding:4px;}
.tab{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:800;color:var(--muted);border:none;background:transparent;cursor:pointer;transition:all .15s;}
.tab:hover{color:var(--white);}
.tab.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.3);}
/* TOGGLE */
.tog{width:34px;height:19px;border-radius:19px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;}
.tog-knob{position:absolute;top:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .2s;}
/* MISC */
.row{display:flex;gap:14px;align-items:flex-start;}
.col{flex:1;min-width:0;}
.sec{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec sub{font-size:11px;font-family:'Nunito',sans-serif;font-weight:800;color:var(--muted);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
@media print{
  body *{visibility:hidden;}
  #parea,#parea *{visibility:visible;}
  #parea{position:fixed;top:0;left:0;width:100%;height:auto;z-index:9999;background:#fff;padding:0;margin:0;}
  @page{size:A4;margin:8mm;}
}
@media(max-width:768px){#nav{transform:translateX(-220px);}#nav.open{transform:translateX(0);}#main{margin-left:0;}#topbar{padding:0 14px 0 56px;}.sgrid{grid-template-columns:1fr 1fr;}#content{padding:12px;}}
@media(max-width:480px){.sgrid{grid-template-columns:1fr 1fr;}.row{flex-direction:column;}}
</style>
<script type="text/javascript">
/* Pure JS QR Code Generator - No CDN, No Internet Required */
/* Based on QR Code spec for alphanumeric/byte encoding */
window.MKFDrawQR=function(canvasEl,text,size){
  /* Use a canvas-based approach - draw QR via Google Charts img but fallback to styled text */
  canvasEl.innerHTML='';
  var sz=size||130;
  /* Try loading image from QR API (needs internet) */
  var wrapper=document.createElement('div');
  wrapper.style.cssText='width:'+sz+'px;height:'+sz+'px;position:relative;margin:0 auto;';
  var img=document.createElement('img');
  img.width=sz; img.height=sz;
  img.style.cssText='display:block;border-radius:4px;';
  /* Try multiple QR APIs */
  var apis=[
    'https://api.qrserver.com/v1/create-qr-code/?size='+sz+'x'+sz+'&data='+encodeURIComponent(text)+'&margin=1',
    'https://chart.googleapis.com/chart?chs='+sz+'x'+sz+'&cht=qr&chl='+encodeURIComponent(text)+'&choe=UTF-8'
  ];
  var apiIdx=0;
  function tryNext(){
    if(apiIdx>=apis.length){
      /* No internet - show styled table number */
      img.style.display='none';
      var fb=document.createElement('div');
      fb.style.cssText='width:'+sz+'px;height:'+sz+'px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;border:2px solid #000;';
      var parts=text.split(':');
      var tNum=parts[1]||text;
      fb.innerHTML='<div style="font-size:11px;color:#666;font-family:monospace;margin-bottom:4px;">MKF AGHAL</div>'
        +'<div style="font-size:32px;font-weight:900;color:#000;font-family:sans-serif;">'+tNum+'</div>'
        +'<div style="font-size:9px;color:#999;margin-top:4px;">TABLE QR (offline)</div>';
      wrapper.appendChild(fb);
      return;
    }
    img.src=apis[apiIdx++];
  }
  img.onerror=function(){ tryNext(); };
  tryNext();
  wrapper.appendChild(img);
  canvasEl.appendChild(wrapper);
};
</script>

/* ========= STATE ========= */
var S = {
  page: 'dashboard',

/* ========= STORAGE ========= */
function ls(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){return d;} }
function lsw(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function readOrders(){ return ls('mkf_orders',[]); }
function writeOrders(o){ lsw('mkf_orders',o); }

/* ========= ADMIN / AUTH ========= */
var DEFAULT_ADMIN = {username:'admin', password:'mkf1234'};
function getAdmin(){ return ls('mkf_admin', DEFAULT_ADMIN); }
function saveAdmin(a){ lsw('mkf_admin', a); }
function checkLogin(){ return ls('mkf_session', false); }
function doLogin(){ lsw('mkf_session', true); S.loggedIn=true; }
function doLogout(){ lsw('mkf_session', false); S.loggedIn=false; showLoginScreen(); }

function getRecoveryCode(){
  var code=ls('mkf_recovery_code','');
  if(!code){
    /* Generate a random 12-char recovery code */
    var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    code='';
    for(var i=0;i<12;i++){
      if(i>0&&i%4===0) code+='-';
      code+=chars.charAt(Math.floor(Math.random()*chars.length));
    }
    lsw('mkf_recovery_code', code);
  }
  return code;
}

/* ═══ TOAST NOTIFICATIONS ═══ */
function toast(msg, type, dur){
  type=type||'success'; dur=dur||3000;
  var icons={success:'&#x2705;',error:'&#x274C;',info:'&#x2139;&#xFE0F;',warning:'&#x26A0;&#xFE0F;'};
  var c=document.getElementById('toast-container');
  if(!c) return;
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML='<span style="font-size:16px;">'+icons[type]+'</span><span style="flex:1;">'+msg+'</span>';
  c.appendChild(t);

function openKDS(){

}
function closeKDS(){
  document.getElementById('kds-overlay').className='';
}
function renderKDS(){
  var overlay=document.getElementById('kds-overlay');
  var orders=S.orders.filter(function(o){return ['pending','confirmed','preparing'].indexOf(o.ownerStatus)>-1;});
  var now=Date.now();
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;letter-spacing:2px;color:var(--white);">&#x1F373; KITCHEN DISPLAY</div>';
  h+='<div style="display:flex;gap:8px;">';
  h+='<div id="kds-clock" style="font-family:Bebas Neue,sans-serif;font-size:20px;color:var(--green);"></div>';
  h+='<button onclick="closeKDS()" style="background:var(--red);border:none;border-radius:9px;padding:8px 16px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;">EXIT &#x2715;</button>';
  h+='</div></div>';
  if(orders.length===0){
    h+='<div style="text-align:center;padding:60px;color:var(--green);"><div style="font-size:80px;margin-bottom:16px;">&#x1F389;</div><div style="font-family:Bebas Neue,sans-serif;font-size:32px;letter-spacing:2px;">ALL CLEAR — NO PENDING ORDERS</div></div>';
  } else {
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">';
    orders.sort(function(a,b){return (a.timestamp||0)-(b.timestamp||0);}).forEach(function(o){
      var age=Math.round((now-(o.timestamp||now))/60000);
      var cls=age>=15?'kds-red':age>=5?'kds-yellow':'kds-green';
      var col=age>=15?'var(--red)':age>=5?'var(--gold)':'var(--green)';
      h+='<div class="kds-card '+cls+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
      h+='<span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:var(--white);">'+esc(o.id)+'</span>';
      h+='<span style="font-family:Bebas Neue,sans-serif;font-size:28px;color:'+col+';">'+age+'m</span>';
      h+='</div>';
      h+='<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;">'+o.ownerStatus.toUpperCase().replace('_',' ')+'</div>';
      (o.items||[]).forEach(function(it){
        h+='<div style="font-size:13px;color:var(--white);font-weight:700;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);">'+esc(it)+'</div>';
      });
      if(o.customer&&o.customer.name) h+='<div style="margin-top:8px;font-size:11px;color:var(--muted2);">&#x1F464; '+esc(o.customer.name)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  overlay.innerHTML=h;
  /* Update KDS clock every second */
  clearInterval(S._kdsTimer);
  S._kdsTimer=setInterval(function(){
    if(!document.getElementById('kds-overlay').className) return;
    var cl=document.getElementById('kds-clock');
    if(cl) cl.textContent=new Date().toLocaleTimeString();
    /* Re-render every 30s for updated timers */
    if(!S._kdsLastRender||Date.now()-S._kdsLastRender>30000){ S._kdsLastRender=Date.now(); renderKDS(); }
  },1000);
}

function pasteToField(id){
  var el=document.getElementById(id);
  if(!el) return;
  if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(function(text){
      el.value=text.trim();
      el.focus();
      toast('Pasted!','success');
    }).catch(function(){
      el.focus();
      toast('Tap & hold the field to paste manually','info',4000);
    });
  } else {
    el.focus();
    toast('Tap & hold the field to paste','info',3000);
  }
}

function copyField(id){
  var el=document.getElementById(id);
  if(!el||!el.value.trim()){ toast('Nothing to copy','warning'); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(el.value.trim()).then(function(){
      toast('Copied!','success');
    }).catch(function(){
      fallbackCopy(el.value.trim());
    });
  } else {
    fallbackCopy(el.value.trim());
  }
}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast('Copied!','success'); }).catch(function(){ fallbackCopy(text); });
  } else { fallbackCopy(text); }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('Copied!','success'); }catch(e){ toast('Could not copy','error'); }
  document.body.removeChild(ta);
}

function attemptReset(){
  var code=document.getElementById('rc-code').value.trim().toUpperCase();
  var pass=document.getElementById('rc-pass').value;
  var conf=document.getElementById('rc-conf').value;
  var err=document.getElementById('rc-err');
  var saved=ls('mkf_recovery_code','');
  if(!saved){ err.textContent='No recovery code found. Please contact support.'; return; }
  if(code!==saved){ err.textContent='Incorrect recovery code. Check Settings for your code.'; return; }
  if(!pass||pass.length<6){ err.textContent='Password must be at least 6 characters.'; return; }
  if(pass!==conf){ err.textContent='Passwords do not match.'; return; }
  var admin=getAdmin();
  saveAdmin({username:admin.username, password:pass});
  /* Generate a new recovery code after use */
  lsw('mkf_recovery_code','');
  getRecoveryCode();
  err.style.color='var(--green)';
  err.textContent='Password reset! Redirecting to login...';
  setTimeout(showLoginScreen, 1500);
}

function attemptLogin(){
  var user=document.getElementById('li-user').value.trim();
  var pass=document.getElementById('li-pass').value;
  var admin=getAdmin();
  if(user===admin.username && pass===admin.password){
    getRecoveryCode(); /* ensure recovery code exists */
    doLogin();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('nav').style.display='';
    document.getElementById('hamburger').style.display='';
    document.getElementById('main').style.display='';
    S.orders=readOrders();
    S.seenIds=ls('mkf_seen_orders',[]);
    var _tl=document.getElementById('topbar-logo');if(_tl)_tl.src=window.MKF_LOGO;
    render(); updateClock();
  } else {
    var err=document.getElementById('li-err');
    if(err){ err.textContent='Incorrect username or password. Try again.'; }
    document.getElementById('li-pass').value='';
    document.getElementById('li-pass').focus();
  }
}

function decodeEmoji(str){
  if(!str||str.indexOf('&')===-1) return str;
  try{ var t=document.createElement('textarea');t.innerHTML=str;return t.value; }catch(e){return str;}
}
function saveMenu(m){
  /* Decode HTML entity emojis before saving */
  var clean=m.map(function(i){
    /* Store imgData in separate key to avoid quota issues with mkf_menu */
    if(i.imgData){
      try{ localStorage.setItem('mkf_img_'+i.id, i.imgData); }catch(e){}
    }
    /* Keep menu lean — just flag hasImg, not the full base64 */
    var slim=Object.assign({},i,{emoji:decodeEmoji(i.emoji||'')});
    delete slim.imgData;
    if(i.imgData) slim.hasImg=true;
    return slim;
  });
  S.menuItems=clean; lsw('mkf_menu',clean);
}

function bp(f,d,v,del){

  o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';

}

function scard(ic,lb,val,cls,trend,sub){
  var trendHtml='';
  if(trend!==undefined){
    var tc=trend>0?'up':trend<0?'down':'same';
    var ta=trend>0?'&#x2191; '+trend+'% vs yesterday':trend<0?'&#x2193; '+Math.abs(trend)+'% vs yesterday':'= same as yesterday';
    trendHtml='<div class="trend '+tc+'">'+ta+'</div>';
  }
  var subHtml=sub?'<div style="font-size:10px;color:var(--muted);margin-top:3px;">'+sub+'</div>':'';
  return '<div class="scard '+cls+'" style="cursor:default;">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'+
    '<div style="font-size:26px;">'+ic+'</div>'+
    '<div class="slabel" style="margin:0;padding-top:4px;">'+lb+'</div>'+
    '</div>'+
    '<div class="sval" style="animation:countUp .4s ease;">'+val+'</div>'+
    trendHtml+subHtml+
    '</div>';
}

    h+='<div class="empty"><div style="font-size:60px;margin-bottom:12px;">&#x1F389;</div><h3 style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--white);margin-bottom:8px;">ALL CLEAR!</h3><p>No active orders right now</p></div>';
  } else {

  return h;
}

function renderOCard(o){
  var st=getSt(o.ownerStatus||'pending');
  var age=Math.round((Date.now()-(o.timestamp||Date.now()))/60000);
  var urgent=age>15&&['pending','confirmed'].indexOf(o.ownerStatus)>-1;
  var addr=[(o.customer&&o.customer.street),(o.customer&&o.customer.village),(o.customer&&o.customer.city)].filter(Boolean).join(', ');
  var h='<div class="ocard '+(o.ownerStatus||'pending')+'" id="oc-'+esc(o.id)+'">';
  var urgencyColor=age>=15?'linear-gradient(90deg,var(--red),var(--orange))':age>=8?'linear-gradient(90deg,var(--gold),var(--orange))':'linear-gradient(90deg,var(--green),var(--green2))';
  var urgencyW=Math.min(age/20*100,100);
  h+='<div style="height:3px;background:var(--card2);border-radius:16px 16px 0 0;margin:-16px -16px 12px -16px;overflow:hidden;"><div style="height:100%;width:'+urgencyW+'%;background:'+urgencyColor+';transition:width 1s;"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">';
  h+='<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">';

  h+='<span class="badge '+badgeCls(o.ownerStatus)+'">'+st.lb+'</span>';
  if(o.payment==='easypaisa') h+='<span class="badge" style="background:rgba(139,92,246,.15);color:var(--purple);">EasyPaisa</span>';
  h+='</div>';
  h+='<div style="display:flex;gap:10px;color:var(--muted);font-size:11px;font-weight:700;">';
  h+='<span>'+fmtT(o.timestamp)+'</span>';
  h+='<span style="color:'+(age>15?'var(--red)':age>8?'var(--gold)':'var(--green)')+';">'+age+'m ago</span>';
  h+='</div></div>';
  h+='<div style="text-align:right;">';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:var(--orange);">'+fmt(o.total)+'</div>';
  h+='<div style="font-size:10px;color:var(--muted);">'+(o.payment||'cash').toUpperCase()+'</div>';
  h+='</div></div>';
  if(o.customer&&(o.customer.name||o.customer.phone)){
    h+='<div style="background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">';
    h+='<div><p style="color:var(--white);font-weight:800;font-size:12px;margin:0 0 2px;">'+esc(o.customer.name||'Customer')+'</p>';
    h+='<p style="color:var(--muted);font-size:11px;margin:0;">'+esc(o.customer.phone||'')+'</p>';
    if(addr) h+='<p style="color:var(--muted2);font-size:11px;margin:0;">&#x1F4CD; '+esc(addr)+'</p>';
    h+='</div>';
    if(o.customer.phone) h+='<a href="tel:'+esc(o.customer.phone)+'" class="btn btn-g btn-sm">&#x1F4DE; CALL</a>';
    h+='</div>';
  }
  h+='<div style="background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:10px;">';
  h+='<div style="font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">ITEMS</div>';
  (o.items||[]).forEach(function(it){ h+='<div style="color:var(--white);font-size:12px;margin-bottom:3px;">&#x2022; '+esc(it)+'</div>'; });
  if(o.note) h+='<div style="margin-top:8px;background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.5);border-radius:9px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px;">'
    +'<span style="font-size:16px;flex-shrink:0;">&#x1F4DD;</span>'
    +'<div><div style="font-size:9px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:2px;">SPECIAL INSTRUCTIONS</div>'
    +'<div style="color:var(--white);font-size:12px;font-weight:700;">'+esc(o.note)+'</div></div></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;">';
  if(o.ownerStatus==='pending'){
    /* Non-cash: show payment instructions banner */

      h+='<div style="font-size:10px;font-weight:800;color:var(--purple);margin-bottom:3px;">&#x1F4B8; '+o.payment.toUpperCase()+' — AWAITING PAYMENT</div>';

      h+='</div>';
    }
    if(o.payment&&o.payment!=='cash'&&!o.paymentConfirmed){
      h+='<button class="btn btn-sm" style="width:100%;margin-bottom:6px;background:rgba(139,92,246,.15);color:var(--purple);border-color:rgba(139,92,246,.4);font-size:12px;" data-action="confirm-payment" data-id="'+esc(o.id)+'">&#x2705; PAYMENT RECEIVED — CONFIRM</button>';

  } else if(st.nx){
    h+='<button class="btn btn-o" style="flex:1;" data-action="advance" data-id="'+esc(o.id)+'" data-next="'+esc(st.nx)+'">'+st.act+'</button>';
  }
  h+='<button class="btn btn-gh btn-sm" data-action="notify" data-id="'+esc(o.id)+'">&#x1F4F1; NOTIFY</button>';
  h+='</div></div>';
  return h;
}

/* ========= CUSTOMERS ========= */
function pgCustomers(){
  var orders=S.orders;
  var cm={};
  orders.forEach(function(o){
    if(o.customer&&o.customer.phone){
      var p=o.customer.phone;
      if(!cm[p]) cm[p]={phone:p,name:o.customer.name||'Unknown',orders:[],spent:0,last:0};
      cm[p].orders.push(o);
      if(o.ownerStatus!=='rejected') cm[p].spent+=o.total;
      if(o.timestamp>cm[p].last) cm[p].last=o.timestamp;

  var custs=Object.values(cm).sort(function(a,b){return b.spent-a.spent;});

  if(custs.length===0){
    h+='<div class="empty"><div style="font-size:56px;margin-bottom:12px;">&#x1F465;</div><h3 style="font-family:Bebas Neue,sans-serif;font-size:20px;margin-bottom:8px;">NO CUSTOMERS YET</h3><p>Customer data appears after orders are placed</p></div>';
  } else {

}

/* ========= REPORTS ========= */
function pgReports(){
  var orders=S.orders;
  var now=Date.now(), day=86400000;
  var mode=S.rptMode||'today';
  var today=new Date();

  /* ── Init default date state ── */
  if(!S.rptDate) S.rptDate=today.toISOString().slice(0,10);
  if(!S.rptWeek) S.rptWeek=getWeekStart(today);
  if(!S.rptMonth){ S.rptMonth=today.getFullYear()+'-'+(today.getMonth()<9?'0':'')+(today.getMonth()+1); }
  if(!S.rptYear) S.rptYear=String(today.getFullYear());
  if(!S.rptFrom) S.rptFrom=today.toISOString().slice(0,10);
  if(!S.rptTo) S.rptTo=today.toISOString().slice(0,10);

  /* ── Filter orders ── */
  var filtered=orders.filter(function(o){
    if(!o.timestamp) return false;
    var d=new Date(o.timestamp);
    if(mode==='today') return d.toDateString()===today.toDateString();
    if(mode==='day'){
      var sel=new Date(S.rptDate+'T00:00:00');
      return d.toDateString()===sel.toDateString();
    }
    if(mode==='week'){
      var ws=new Date(S.rptWeek+'T00:00:00');
      var we=new Date(ws.getTime()+7*day);
      return o.timestamp>=ws.getTime()&&o.timestamp<we.getTime();
    }
    if(mode==='month'){
      var parts=S.rptMonth.split('-');
      return d.getFullYear()===parseInt(parts[0])&&d.getMonth()===parseInt(parts[1])-1;
    }
    if(mode==='year'){
      return d.getFullYear()===parseInt(S.rptYear);
    }
    if(mode==='range'){
      var from=new Date(S.rptFrom+'T00:00:00').getTime();
      var to=new Date(S.rptTo+'T23:59:59').getTime();
      return o.timestamp>=from&&o.timestamp<=to;
    }
    return false;
  });

  var del=filtered.filter(function(o){return o.ownerStatus==='delivered';});
  var rev=del.reduce(function(s,o){return s+o.total;},0);
  var gst=Math.round(rev*0.17);
  var avg=del.length?Math.round(rev/del.length):0;
  var ic={};
  del.forEach(function(o){(o.items||[]).forEach(function(i){var n=i.replace(/ x\d+$/,'');ic[n]=(ic[n]||0)+1;});});
  var top=Object.keys(ic).sort(function(a,b){return ic[b]-ic[a];}).slice(0,8);
  var pay={cash:0,card:0,easypaisa:0};
  del.forEach(function(o){pay[o.payment||'cash']=(pay[o.payment||'cash']||0)+1;});

  /* period label */
  function periodLabel(){
    if(mode==='today') return 'Today — '+fmtD(Date.now());
    if(mode==='day') return 'Day — '+fmtD(new Date(S.rptDate+'T00:00:00').getTime());
    if(mode==='week'){
      var ws=new Date(S.rptWeek+'T00:00:00');
      var we=new Date(ws.getTime()+6*86400000);
      return 'Week — '+fmtD(ws.getTime())+' to '+fmtD(we.getTime());
    }
    if(mode==='month'){
      var p2=S.rptMonth.split('-');
      var mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
      return 'Month — '+mn[parseInt(p2[1])-1]+' '+p2[0];
    }
    if(mode==='year') return 'Year — '+S.rptYear;
    if(mode==='range') return 'Range — '+fmtD(new Date(S.rptFrom).getTime())+' to '+fmtD(new Date(S.rptTo).getTime());
    return '';
  }

  var h='<div class="fade">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">';
  h+='<div><div class="sec" style="margin:0;">REPORTS & ANALYTICS</div>';
  h+='<div style="font-size:11px;color:var(--green);font-weight:700;margin-top:2px;">'+periodLabel()+'</div></div>';
  h+='<button class="btn btn-g" data-action="generate-report">&#x1F5A8;&#xFE0F; GENERATE / PRINT REPORT</button>';
  h+='</div>';

  /* mode tabs */
  h+='<div class="card" style="padding:16px;margin-bottom:16px;">';
  h+='<div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:10px;">SELECT REPORT PERIOD</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">';
  var modes=[['today','Today'],['day','Specific Day'],['week','Week'],['month','Month'],['year','Year'],['range','Date Range']];
  modes.forEach(function(m){
    h+='<button class="btn btn-sm '+(mode===m[0]?'btn-g':'btn-gh')+'" data-group="rptmode" data-mode="'+m[0]+'">'+m[1]+'</button>';
  });
  h+='</div>';

  if(mode==='day'){
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">SELECT DATE</label>';
    h+='<input type="date" class="inp" id="rpt-day" value="'+esc(S.rptDate)+'" style="max-width:180px;color-scheme:dark;" data-action="rpt-day-change"/>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-day-prev">&#x2190; Prev</button>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-day-next">Next &#x2192;</button>';
    h+='</div>';
  } else if(mode==='week'){
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">WEEK STARTING</label>';
    h+='<input type="date" class="inp" id="rpt-week" value="'+esc(S.rptWeek)+'" style="max-width:180px;color-scheme:dark;" data-action="rpt-week-change"/>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-week-prev">&#x2190; Prev Week</button>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-week-next">Next Week &#x2192;</button>';
    h+='</div>';
  } else if(mode==='month'){
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">SELECT MONTH</label>';
    h+='<input type="month" class="inp" id="rpt-month" value="'+esc(S.rptMonth)+'" style="max-width:180px;color-scheme:dark;" data-action="rpt-month-change"/>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-month-prev">&#x2190; Prev</button>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-month-next">Next &#x2192;</button>';
    h+='</div>';
  } else if(mode==='year'){
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">SELECT YEAR</label>';
    h+='<select class="inp" id="rpt-year" data-action="rpt-year-change" style="max-width:120px;">';
    var curY=new Date().getFullYear();
    for(var yy=curY;yy>=curY-5;yy--){
      h+='<option value="'+yy+'"'+(String(yy)===S.rptYear?' selected':'')+'>'+yy+'</option>';
    }
    h+='</select>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-year-prev">&#x2190; Prev</button>';
    h+='<button class="btn btn-gh btn-sm" data-action="rpt-year-next">Next &#x2192;</button>';
    h+='</div>';
  } else if(mode==='range'){
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">FROM</label>';
    h+='<input type="date" class="inp" id="rpt-from" value="'+esc(S.rptFrom)+'" style="max-width:160px;color-scheme:dark;" data-action="rpt-from-change"/>';
    h+='<label style="font-size:11px;font-weight:800;color:var(--muted);">TO</label>';
    h+='<input type="date" class="inp" id="rpt-to" value="'+esc(S.rptTo)+'" style="max-width:160px;color-scheme:dark;" data-action="rpt-to-change"/>';
    h+='</div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">';
    var shortcuts=[['Last 7 Days','last7'],['Last 30 Days','last30'],['Last 90 Days','last90'],['This Year','thisyear']];
    shortcuts.forEach(function(sc){
      h+='<button class="btn btn-gh btn-sm" data-action="rpt-shortcut" data-shortcut="'+sc[1]+'">'+sc[0]+'</button>';
    });
    h+='</div>';
  }

function getWeekStart(d){
  var dt=new Date(d);
  var day=dt.getDay();
  dt.setDate(dt.getDate()-day);
  return dt.toISOString().slice(0,10);
}
function addDays(dateStr,n){
  var d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function addMonths(monthStr,n){
  var p=monthStr.split('-');
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1+n,1);
  return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1);
}

  } else {
    h+='<div style="max-height:520px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;">';
    var styleColors={orange:'#FF5200',gold:'#F59E0B',green:'#10B981',blue:'#3B82F6',purple:'#8B5CF6',red:'#EF4444'};

      h+='<span style="font-size:18px;">'+ico+'</span>';
      h+='<div>';
      h+='<div style="font-family:Bebas Neue,sans-serif;font-size:16px;color:#fff;letter-spacing:1px;line-height:1.1;">'+esc(o.title)+'</div>';
      if(o.code){
        h+='<div style="display:flex;align-items:center;gap:6px;">';
        h+='<span style="font-size:10px;color:rgba(255,255,255,.85);font-weight:800;letter-spacing:1px;">CODE: '+esc(o.code)+'</span>';
        h+='<button onclick="copyText(\''+esc(o.code)+'\')" style="background:rgba(0,0,0,.25);border:none;border-radius:5px;color:#fff;font-size:9px;font-weight:800;cursor:pointer;padding:2px 6px;">COPY</button>';
        h+='</div>';
      }
      h+='</div></div>';
      /* Active toggle */
      h+='<div onclick="toggleOffer(\''+o.id+'\')" style="width:42px;height:23px;background:'+(isActive?'rgba(255,255,255,.4)':'rgba(0,0,0,.3)')+';border-radius:12px;cursor:pointer;position:relative;flex-shrink:0;">';
      h+='<div style="position:absolute;top:3px;left:'+(isActive?'21px':'3px')+';width:17px;height:17px;background:#fff;border-radius:50%;transition:left .2s;"></div></div>';
      h+='</div>';

      h+='<div style="padding:10px 14px;">';
      h+='<p style="color:var(--muted2);font-size:12px;margin:0 0 6px;">'+esc(o.desc)+'</p>';
      /* Show deal items if any */
      if(o.dealItems&&o.dealItems.length>0){
        var dealSub=o.dealItems.reduce(function(s,i){return s+i.price*i.qty;},0);
        h+='<div style="background:var(--card);border-radius:9px;padding:8px 10px;margin-bottom:7px;border:1px solid var(--border);">';
        h+='<div style="font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">&#x1F4E6; INCLUDED IN THIS DEAL</div>';
        o.dealItems.forEach(function(di){
          h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">';
          h+='<span style="font-size:11px;color:var(--white);">'+di.emoji+' '+esc(di.name)+(di.qty>1?' x'+di.qty:'')+'</span>';
          h+='<span style="font-size:11px;color:var(--orange);font-weight:700;">'+fmt(di.price*di.qty)+'</span>';
          h+='</div>';

        var finalPrice=o.type==='percent'?Math.round(dealSub*(1-o.value/100)):(o.type==='fixed'?dealSub-o.value:dealSub);
        h+='<div style="border-top:1px dashed var(--border);margin-top:5px;padding-top:5px;display:flex;justify-content:space-between;">';
        h+='<span style="font-size:10px;color:var(--muted2);">Original: <s>'+fmt(dealSub)+'</s></span>';

        h+='</div></div>';
      }
      h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;">';
      /* Tags */
      var discStr=o.type==='percent'?o.value+'% OFF':o.type==='fixed'?'Rs '+o.value+' OFF':o.type==='bogo'?'BUY 1 GET 1':o.type==='freeitem'?'FREE ITEM':'FLAT PRICE';
      h+='<span style="background:'+col+'22;color:'+col+';border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">'+discStr+'</span>';

      if(o.minOrder>0) h+='<span style="background:rgba(255,255,255,.08);color:var(--muted2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;">Min Rs '+o.minOrder+'</span>';

        var dStr=(o.fromDate||'')+(o.fromDate&&o.endDate?' — ':'')+(o.endDate||'');
        h+='<span style="background:rgba(255,255,255,.08);color:var(--muted2);border-radius:20px;padding:3px 10px;font-size:10px;">&#x1F4C5; '+dStr+'</span>';
      }

      h+='</div>';
      h+='<div style="display:flex;justify-content:flex-end;gap:6px;">';
      h+='<button class="btn btn-sm btn-gh" data-action="del-offer" data-id="'+o.id+'">&#x1F5D1; Delete</button>';
      h+='</div></div></div>';
    });
    h+='</div>';
  }
  h+='</div></div></div></div>';
  return h;
}

function toggleOffer(id){
  var offers=getOffers();
  var o=offers.find(function(x){return x.id===id;});
  if(!o) return;
  o.active=!o.active;
  saveOffers(offers);
  toast(o.active?'Offer activated!':'Offer deactivated','info');
  render();
}

function pgExpenses(){
  var exps=getExpenses();
  var now=new Date();
  var todayStr=now.toDateString();
  var todayExps=exps.filter(function(e){return e.date&&new Date(e.date).toDateString()===todayStr;});
  var monthExps=exps.filter(function(e){
    if(!e.date) return false;
    var d=new Date(e.date);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  });
  var todayTotal=todayExps.reduce(function(s,e){return s+e.amount;},0);
  var monthTotal=monthExps.reduce(function(s,e){return s+e.amount;},0);
  var allTotal=exps.reduce(function(s,e){return s+e.amount;},0);

  /* Revenue for P&L */
  var orders=S.orders;
  var allDel=orders.filter(function(o){return o.ownerStatus==='delivered';});
  var totalRev=allDel.reduce(function(s,o){return s+o.total;},0);
  var todayDel=allDel.filter(function(o){return o.timestamp&&new Date(o.timestamp).toDateString()===todayStr;});
  var todayRev=todayDel.reduce(function(s,o){return s+o.total;},0);
  var monthDel=allDel.filter(function(o){
    if(!o.timestamp) return false;
    var d=new Date(o.timestamp);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  });
  var monthRev=monthDel.reduce(function(s,o){return s+o.total;},0);

  var CATS=['Ingredients','Staff','Utilities','Packaging','Rent','Maintenance','Marketing','Other'];
  var catColors={Ingredients:'var(--orange)',Staff:'var(--blue2)',Utilities:'var(--gold)',Packaging:'var(--green)',Rent:'var(--red)',Maintenance:'var(--purple)',Marketing:'var(--green2)',Other:'var(--muted2)'};

  var h='<div class="fade">';

  /* P&L Summary Cards */
  h+='<div class="sgrid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:16px;">';
  h+=scard('&#x1F4C5;','Today Expense',fmt(todayTotal),'r',undefined,fmt(todayRev)+' revenue');
  h+=scard('&#x1F4C8;','Month Expense',fmt(monthTotal),'o',undefined,fmt(monthRev)+' revenue');
  h+=scard('&#x1F4B8;','Total Expense',fmt(allTotal),'p',undefined,fmt(totalRev)+' revenue');
  /* Net Profit card */
  var profit=totalRev-allTotal;
  h+=scard(profit>=0?'&#x1F4B9;':'&#x1F4C9;','Net Profit',fmt(profit),profit>=0?'g':'r',undefined,profit>=0?'Profitable!':'Loss');
  h+='</div>';

  /* P&L Table */
  h+='<div class="card" style="padding:18px;margin-bottom:16px;">';
  h+='<div class="sec" style="margin-bottom:14px;">PROFIT & LOSS SUMMARY</div>';
  h+='<div style="overflow-x:auto;"><table style="width:100%;"><thead><tr><th>PERIOD</th><th>REVENUE</th><th>EXPENSES</th><th>PROFIT</th><th>MARGIN</th></tr></thead><tbody>';
  var periods=[['Today',todayRev,todayTotal],['This Month',monthRev,monthTotal],['All Time',totalRev,allTotal]];
  periods.forEach(function(p){
    var pr=p[1]-p[2];
    var mg=p[1]>0?Math.round(pr/p[1]*100):0;
    h+='<tr>';
    h+='<td style="font-weight:800;color:var(--white);">'+p[0]+'</td>';
    h+='<td style="color:var(--green);font-weight:700;">'+fmt(p[1])+'</td>';
    h+='<td style="color:var(--red);font-weight:700;">'+fmt(p[2])+'</td>';
    h+='<td style="font-family:Bebas Neue,sans-serif;font-size:16px;color:'+(pr>=0?'var(--green)':'var(--red)')+';">'+fmt(pr)+'</td>';
    h+='<td><span style="background:'+(pr>=0?'rgba(16,185,129,.15)':'rgba(239,68,68,.12)')+';color:'+(pr>=0?'var(--green)':'var(--red)')+';border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800;">'+mg+'%</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  /* Add Expense Form */
  h+='<div class="row"><div class="col">';
  h+='<div class="card" style="padding:18px;margin-bottom:14px;">';
  h+='<div class="sec" style="margin-bottom:14px;">ADD EXPENSE</div>';
  h+='<div class="fg"><label class="lbl">DESCRIPTION</label><input class="inp" id="exp-desc" placeholder="e.g. Chicken 5kg, Electricity bill"/></div>';
  h+='<div style="display:flex;gap:10px;">';
  h+='<div class="fg col"><label class="lbl">AMOUNT (Rs)</label><input class="inp" id="exp-amt" type="number" placeholder="500" inputmode="numeric"/></div>';
  h+='<div class="fg col"><label class="lbl">CATEGORY</label><select class="inp" id="exp-cat">';
  CATS.forEach(function(c){ h+='<option value="'+c+'">'+c+'</option>'; });
  h+='</select></div></div>';
  h+='<div class="fg"><label class="lbl">DATE</label><input class="inp" id="exp-date" type="date" value="'+now.toISOString().slice(0,10)+'" style="color-scheme:dark;"/></div>';
  h+='<button class="btn btn-g" data-action="add-expense" style="width:100%;">+ ADD EXPENSE</button>';
  h+='</div></div>';

  /* Expense list */
  h+='<div class="col" style="flex:1.5;">';
  h+='<div class="card" style="padding:18px;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  h+='<div class="sec" style="margin:0;">RECENT EXPENSES</div>';
  h+='<span style="color:var(--muted);font-size:11px;font-weight:700;">'+exps.length+' total</span>';
  h+='</div>';
  if(exps.length===0){
    h+='<div class="empty" style="padding:20px 0;"><p>No expenses logged yet</p></div>';
  } else {
    h+='<div style="max-height:400px;overflow-y:auto;">';
    exps.slice().reverse().slice(0,50).forEach(function(e){
      var cc=catColors[e.cat]||'var(--muted2)';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="flex:1;">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">';
      h+='<span style="font-size:12px;font-weight:800;color:var(--white);">'+esc(e.desc)+'</span>';
      h+='<span style="background:'+cc+'22;color:'+cc+';border-radius:20px;padding:2px 8px;font-size:9px;font-weight:800;">'+esc(e.cat)+'</span>';
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--muted);">'+fmtD(new Date(e.date).getTime())+'</div>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:10px;">';
      h+='<span style="font-family:Bebas Neue,sans-serif;font-size:18px;color:var(--red);">'+fmt(e.amount)+'</span>';
      h+='<button class="btn btn-sm" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);padding:4px 8px;" data-action="del-expense" data-id="'+e.id+'">&#x2715;</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div></div></div></div>';
  return h;
}

function getStaff(){ return ls('mkf_staff',[]); }
function saveStaff(s){ lsw('mkf_staff',s); }
function getPayments(){ return ls('mkf_payments',[]); }
function savePayments(p){ lsw('mkf_payments',p); }

function pgStaff(){
  var staff=getStaff();
  var payments=getPayments();
  var now=new Date();
  var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var curMonth=monthNames[now.getMonth()]+' '+now.getFullYear();

  /* Monthly salary summary */
  var monthKey=now.getFullYear()+'-'+(now.getMonth()<9?'0':'')+(now.getMonth()+1);
  var thisMonthPaid=payments.filter(function(p){return p.monthKey===monthKey;});
  var totalPayroll=staff.reduce(function(s,e){return s+e.salary;},0);
  var paidThisMonth=thisMonthPaid.reduce(function(s,p){return s+p.amount;},0);

  var h='<div class="fade">';

  /* Summary cards */
  h+='<div class="sgrid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:16px;">';
  h+=scard('&#x1F465;','Total Staff',staff.length,'b',undefined,'employees');
  h+=scard('&#x1F4B0;','Monthly Payroll',fmt(totalPayroll),'o',undefined,'total salaries');
  h+=scard('&#x2705;','Paid This Month',fmt(paidThisMonth),'g',undefined,thisMonthPaid.length+' paid');
  h+=scard('&#x23F3;','Pending',fmt(Math.max(0,totalPayroll-paidThisMonth)),'r',undefined,'to be paid');
  h+='</div>';

  h+='<div class="row"><div class="col">';

  /* Add Employee Form */
  h+='<div class="card" style="padding:18px;margin-bottom:14px;">';
  h+='<div class="sec" style="margin-bottom:14px;">&#x2795; ADD EMPLOYEE</div>';
  h+='<div class="fg"><label class="lbl">FULL NAME</label><input class="inp" id="st-name" placeholder="e.g. Ahmed Khan"/></div>';
  h+='<div class="fg"><label class="lbl">ROLE / DESIGNATION</label><input class="inp" id="st-role" placeholder="e.g. Chef, Cashier, Waiter"/></div>';
  h+='<div style="display:flex;gap:10px;">';
  h+='<div class="fg col"><label class="lbl">SALARY (Rs/month)</label><input class="inp" id="st-salary" type="number" placeholder="15000" inputmode="numeric"/></div>';
  h+='<div class="fg col"><label class="lbl">PHONE</label><input class="inp" id="st-phone" placeholder="03001234567" inputmode="tel"/></div>';
  h+='</div>';
  h+='<div class="fg"><label class="lbl">JOIN DATE</label><input class="inp" id="st-join" type="date" value="'+now.toISOString().slice(0,10)+'" style="color-scheme:dark;"/></div>';
  h+='<button class="btn btn-g" data-action="add-employee" style="width:100%;">&#x2795; ADD EMPLOYEE</button>';
  h+='</div>';

  /* Pay Salary Form */
  if(staff.length>0){
    h+='<div class="card" style="padding:18px;">';
    h+='<div class="sec" style="margin-bottom:14px;">&#x1F4B8; PAY SALARY</div>';
    h+='<div class="fg"><label class="lbl">SELECT EMPLOYEE</label><select class="inp" id="pay-emp">';
    staff.forEach(function(e){
      var alreadyPaid=thisMonthPaid.find(function(p){return p.empId===e.id;});
      h+='<option value="'+e.id+'" data-salary="'+e.salary+'"'+(alreadyPaid?' disabled':'')+'>'+esc(e.name)+' — '+fmt(e.salary)+(alreadyPaid?' (PAID)':'')+'</option>';
    });
    h+='</select></div>';

      h+='<div style="display:flex;gap:6px;">';

      h+='<button class="btn btn-sm" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);" data-action="del-employee" data-id="'+e.id+'">&#x1F5D1;</button>';
      h+='</div></div>';

  h+='</div></div></div></div>';
  return h;

    '<p style="color:#fff;font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:2px;margin:0;">SALARY PAYSLIP — '+monthLabel.toUpperCase()+'</p>'+

    '<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:#666;font-weight:700;">PHONE</span><span style="font-size:12px;color:#111;font-weight:700;">'+esc(emp.phone||'--')+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;"><span style="font-size:11px;color:#666;font-weight:700;">PAY DATE</span><span style="font-size:12px;color:#111;font-weight:700;">'+fmtD(pDate.getTime())+'</span></div>'+

    (payment.note?'<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#666;font-size:12px;">Note</span><span style="color:#FF5200;font-size:11px;font-style:italic;">'+esc(payment.note)+'</span></div>':'')+

function getInventory(){ return ls('mkf_inventory',[]); }
function saveInventory(i){ lsw('mkf_inventory',i); }

function pgInventory(){
  var inv=getInventory();
  var low=inv.filter(function(i){return i.qty<=i.minQty;});
  var h='<div class="fade">';
  h+='<div class="sgrid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:16px;">';
  h+=scard('&#x1F4E6;','Total Items',inv.length,'b',undefined,'in stock');
  h+=scard('&#x26A0;&#xFE0F;','Low Stock',low.length,'r',undefined,'need restock');
  var totalVal=inv.reduce(function(s,i){return s+i.qty*(i.unitCost||0);},0);
  h+=scard('&#x1F4B0;','Stock Value',fmt(totalVal),'g',undefined,'estimated');
  h+='</div>';

  /* Low stock alert */
  if(low.length>0){
    h+='<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:14px 16px;margin-bottom:16px;">';
    h+='<div style="font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;margin-bottom:8px;">&#x26A0;&#xFE0F; LOW STOCK ALERT</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    low.forEach(function(i){
      h+='<span style="background:rgba(239,68,68,.15);color:var(--red);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;">'+esc(i.name)+' ('+i.qty+' left)</span>';
    });
    h+='</div></div>';
  }

  h+='<div class="row"><div class="col">';
  /* Add item form */
  h+='<div class="card" style="padding:18px;margin-bottom:14px;">';
  h+='<div class="sec" style="margin-bottom:14px;">&#x2795; ADD STOCK ITEM</div>';
  h+='<div class="fg"><label class="lbl">ITEM NAME</label><input class="inp" id="inv-name" placeholder="e.g. Chicken, Buns, Pepsi cans"/></div>';
  h+='<div style="display:flex;gap:10px;">';
  h+='<div class="fg col"><label class="lbl">UNIT</label><select class="inp" id="inv-unit"><option>kg</option><option>g</option><option>pieces</option><option>liters</option><option>packets</option><option>boxes</option><option>dozen</option></select></div>';
  h+='<div class="fg col"><label class="lbl">QUANTITY</label><input class="inp" id="inv-qty" type="number" placeholder="10" inputmode="numeric"/></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:10px;">';
  h+='<div class="fg col"><label class="lbl">MIN ALERT AT</label><input class="inp" id="inv-min" type="number" placeholder="2" inputmode="numeric"/></div>';
  h+='<div class="fg col"><label class="lbl">UNIT COST (Rs)</label><input class="inp" id="inv-cost" type="number" placeholder="500" inputmode="numeric"/></div>';
  h+='</div>';
  h+='<button class="btn btn-g" data-action="add-inv-item" style="width:100%;">&#x2795; ADD TO INVENTORY</button>';
  h+='</div>';

  /* Quick update form */
  if(inv.length>0){
    h+='<div class="card" style="padding:18px;">';
    h+='<div class="sec" style="margin-bottom:14px;">&#x1F504; UPDATE STOCK</div>';
    h+='<div class="fg"><label class="lbl">SELECT ITEM</label><select class="inp" id="inv-sel">';
    inv.forEach(function(i){ h+='<option value="'+i.id+'">'+esc(i.name)+' ('+i.qty+' '+esc(i.unit)+')</option>'; });
    h+='</select></div>';
    h+='<div style="display:flex;gap:8px;">';
    h+='<input class="inp" id="inv-upd-qty" type="number" placeholder="Adjust qty (+/-)" style="flex:1;" inputmode="numeric"/>';
    h+='<button class="btn btn-g" data-action="upd-inv-item" style="flex:0 0 auto;">UPDATE</button>';
    h+='</div></div>';
  }
  h+='</div>';

  /* Stock list */
  h+='<div class="col" style="flex:1.5;">';
  h+='<div class="card" style="padding:18px;">';
  h+='<div class="sec" style="margin-bottom:14px;">STOCK LIST</div>';
  if(inv.length===0){
    h+='<div class="empty" style="padding:20px 0;"><div style="font-size:48px;margin-bottom:12px;">&#x1F4E6;</div><p>No items in inventory yet</p></div>';
  } else {
    h+='<div style="max-height:420px;overflow-y:auto;">';
    inv.slice().sort(function(a,b){return (a.qty<=a.minQty?0:1)-(b.qty<=b.minQty?0:1);}).forEach(function(i){
      var isLow=i.qty<=i.minQty;
      var pct=i.minQty>0?Math.min(i.qty/Math.max(i.minQty*3,1)*100,100):50;
      var col=isLow?'var(--red)':pct<50?'var(--gold)':'var(--green)';
      h+='<div style="padding:12px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">';
      h+='<div>';
      h+='<div style="font-weight:800;color:var(--white);font-size:13px;">'+esc(i.name)+(isLow?' <span style="background:rgba(239,68,68,.15);color:var(--red);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:800;">LOW</span>':'')+'</div>';
      h+='<div style="font-size:11px;color:var(--muted);margin-top:2px;">Min: '+i.minQty+' '+esc(i.unit)+(i.unitCost?' \u2022 Rs '+i.unitCost+'/'+esc(i.unit):'')+'</div>';
      h+='</div>';
      h+='<div style="text-align:right;">';
      h+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+col+';">'+i.qty+'</div>';
      h+='<div style="font-size:10px;color:var(--muted);">'+esc(i.unit)+'</div>';
      h+='</div></div>';
      h+='<div style="background:var(--card2);border-radius:4px;height:5px;">';
      h+='<div style="background:'+col+';height:100%;width:'+Math.max(pct,3)+'%;border-radius:4px;transition:width .4s;"></div>';
      h+='</div>';
      h+='<div style="display:flex;justify-content:flex-end;gap:5px;margin-top:8px;">';
      h+='<button class="btn btn-gh btn-sm" data-action="inv-quick-add" data-id="'+i.id+'" data-name="'+esc(i.name)+'" data-unit="'+esc(i.unit)+'">+ Restock</button>';
      h+='<button class="btn btn-sm" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);" data-action="del-inv-item" data-id="'+i.id+'">&#x1F5D1;</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div></div></div></div>';
  return h;
}

function getBranches(){ return ls('mkf_branches',[{id:'main',name:getSettings().name,address:getSettings().address,phone:getSettings().phone,isMain:true,active:true}]); }

function previewOfferImg(input){
  if(!input.files||!input.files[0]) return;
  var file=input.files[0];
  if(file.size>3*1024*1024){ toast('Image too large. Use under 3MB.','warning'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    S._pendingOfferImg=e.target.result;
    var prev=document.getElementById('off-img-preview');
    if(prev){
      prev.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;"/>';
    }
  };
  reader.readAsDataURL(file);
}

function previewLogo(input){
  if(!input.files||!input.files[0]) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var src=e.target.result;
    var prev=document.getElementById('logo-preview');
    if(prev) prev.src=src;
    S._pendingLogo=src;
  };
  reader.readAsDataURL(input.files[0]);
}

function liveUpdateOwnerName(val){
  var n=document.getElementById('nav-owner-name');
  var t=document.getElementById('topbar-owner-name');
  if(n) n.textContent=val;
  if(t) t.textContent=val;
}

function liveUpdateName(val){
  /* Update nav and topbar name live */
  var h=document.querySelector('.nlogo-t h2');
  if(h) h.textContent=val.toUpperCase();
  var tt=document.getElementById('ttitle');
  /* don't change page title */
}

function applyLogo(src){
  window.MKF_LOGO=src;
  var imgs=[document.getElementById('nav-logo-img'), document.getElementById('topbar-logo'), document.getElementById('logo-preview')];
  imgs.forEach(function(el){if(el)el.src=src;});
  lsw('mkf_custom_logo',src);
}

/* ========= MODAL HELPERS ========= */
function showModal(html,mw){
  var c=document.getElementById('mcon');
  var ov=document.createElement('div');
  ov.className='overlay';
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});
  var m=document.createElement('div');
  m.className='modal fade';
  m.style.maxWidth=mw||'480px';
  m.innerHTML=html;
  ov.appendChild(m);
  c.appendChild(ov);
  bindAll();
}
function closeModal(){ document.getElementById('mcon').innerHTML=''; }

  h+='<label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:4px;">';
  h+='<input type="checkbox" id="fi-pop"'+(item&&item.pop?' checked':'')+' style="width:15px;height:15px;accent-color:var(--green);"/>';
  h+='<span style="color:var(--muted2);font-size:13px;font-weight:700;">Mark as Popular</span></label>';
  h+='</div>';

  h+=(isEdit?'SAVE CHANGES':'ADD ITEM')+'</button></div>';
  showModal(h,'500px');

function previewItemImg(input){
  if(!input.files||!input.files[0]) return;
  var file=input.files[0];
  if(file.size>2*1024*1024){ alert('Image too large. Please use an image under 2MB.'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    S._pendingItemImg=e.target.result;
    var prev=document.getElementById('fi-img-preview');
    if(prev){
      prev.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;"/>';
    }
  };
  reader.readAsDataURL(file);
}

function clearItemImg(){
  S._pendingItemImg='REMOVE';
  var prev=document.getElementById('fi-img-preview');
  var emo=document.getElementById('fi-emoji');
  if(prev) prev.innerHTML='<span style="font-size:30px;">'+(emo?emo.value:'&#x1F354;')+'</span>';
}

/* ========= TABLE MODAL ========= */
function showTableModal(tableId){
  var tables=getTables();
  var t=tables.find(function(x){return x.id==tableId;});
  if(!t) return;

  /* Free table — ask name then go straight to add items */
  if(t.status==='free'){
    var h='<div class="mhead"><h3>TABLE '+tableId+' &mdash; NEW ORDER</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
    h+='<div class="mbody" style="text-align:center;padding-top:8px;">';
    h+='<div style="font-size:54px;margin-bottom:12px;">&#x1FA91;</div>';
    h+='<p style="color:var(--muted2);margin-bottom:16px;">Start a new order for this table?</p>';
    h+='<div class="fg"><label class="lbl">Customer Name (optional)</label><input class="inp" id="tc-name" placeholder="e.g. Usman Bhai"/></div>';
    h+='<button class="btn btn-g" style="width:100%;font-size:15px;padding:13px;" data-action="start-table" data-id="'+tableId+'">&#x1F37D;&#xFE0F; START ORDER</button>';
    h+='</div>';
    showModal(h,'420px');

  } else if(t.status==='occupied'){

  /* Paid — show clear confirmation */
  } else {
    var h2='<div class="mhead"><h3>TABLE '+tableId+' &mdash; PAID &#x2713;</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
    h2+='<div class="mbody" style="text-align:center;padding-top:8px;">';

    h2+='<div style="font-family:Bebas Neue,sans-serif;font-size:30px;color:var(--green);margin-bottom:4px;">PAID</div>';
    h2+='<p style="color:var(--muted2);font-size:13px;margin-bottom:4px;">'+fmt(t.order?t.order.total:0)+' collected</p>';
    if(t.order&&t.order.amtPaid){
      h2+='<p style="color:var(--muted);font-size:12px;margin-bottom:4px;">Received: Rs '+Math.round(t.order.amtPaid).toLocaleString()+' &bull; Change: Rs '+Math.round(t.order.change||0).toLocaleString()+'</p>';
    }
    h2+='<p style="color:var(--muted);font-size:11px;margin-bottom:20px;">('+(t.order&&t.order.payMethod?t.order.payMethod.toUpperCase():'CASH')+')</p>';
    h2+='<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;">';
    h2+='<button class="btn btn-gh btn-sm" style="flex:1;" data-action="print-table-bill" data-id="'+tableId+'">&#x1F5A8; REPRINT</button>';
    h2+='<button class="btn btn-o btn-sm" style="flex:1;" data-action="reopen-table" data-id="'+tableId+'">&#x2795; ADD MORE</button>';
    h2+='</div>';
    h2+='<button class="btn btn-r" style="width:100%;" data-action="clear-table" data-id="'+tableId+'">&#x1F9F9; CLEAR TABLE & FINISH</button>';
    h2+='</div></div>';

function showPaymentScreen(tableId){
  var tables=getTables();

  var gst=Math.round(sub*sett.gst/100);

  var alreadyPaid=t.order.paidTotal||0;
  var total=fullTotal-alreadyPaid; /* amount due NOW */

  var h='<div class="mhead"><h3>TABLE '+tableId+' &mdash; PAYMENT</h3><button class="mclose" data-action="close-modal">&#x2715;</button></div>';
  h+='<div class="mbody">';

  h+='<div style="background:var(--card2);border-radius:12px;padding:14px;margin-bottom:16px;">';

      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);">';
      h+='<span style="color:var(--muted2);font-size:12px;">'+esc(it.name)+' x'+it.qty+'</span>';

  h+='<span style="color:var(--white);font-size:12px;">'+fmt(sub)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">';

  h+='<span style="color:var(--green);font-size:12px;">'+fmt(gst)+'</span></div>';
  if(alreadyPaid>0){
    h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">';
    h+='<span style="color:var(--muted);font-size:12px;">Full Bill (incl. GST)</span>';
    h+='<span style="color:var(--white);font-size:12px;">'+fmt(fullTotal)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;padding:5px 0;">';
    h+='<span style="color:var(--green);font-size:12px;">Already Paid</span>';
    h+='<span style="color:var(--green);font-size:12px;font-weight:800;">- '+fmt(alreadyPaid)+'</span></div>';
  }
  h+='<div style="display:flex;justify-content:space-between;padding:8px 0 0;">';
  h+='<span style="font-weight:800;color:var(--white);font-size:14px;">'+(alreadyPaid>0?'AMOUNT DUE':'TOTAL PKR')+'</span>';
  h+='<span style="font-family:Bebas Neue,sans-serif;font-size:26px;color:var(--orange);">'+fmt(total)+'</span>';
  h+='</div></div>';

  /* Amount tendered */
  h+='<div class="fg"><label class="lbl">AMOUNT RECEIVED (Rs)</label>';
  h+='<input type="number" class="inp" id="pay-amount" placeholder="Enter amount given by customer" style="font-size:16px;padding:13px;" oninput="calcChange('+total+')" inputmode="numeric"/></div>';

  /* Change display */
  h+='<div id="pay-change" style="background:var(--card2);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">';
  h+='<span style="color:var(--muted);font-size:13px;font-weight:700;">CHANGE</span>';
  h+='<span id="change-val" style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--green);">Rs 0</span>';
  h+='</div>';

  /* Payment method */
  h+='<div class="fg"><label class="lbl">PAYMENT METHOD</label>';
  h+='<div style="display:flex;gap:8px;">';
  [['cash','&#x1F4B5; Cash'],['card','&#x1F4B3; Card'],['easypaisa','&#x1F4F1; EasyPaisa']].forEach(function(m){
    h+='<button class="btn '+(m[0]==='cash'?'btn-g':'btn-gh')+' btn-sm" id="pm-'+m[0]+'" data-action="set-paymethod" data-method="'+m[0]+'" style="flex:1;justify-content:center;">'+m[1]+'</button>';
  });
  h+='</div></div>';
  h+='</div>';

  h+='<div class="mfoot" style="gap:8px;">';
  h+='<button class="btn btn-gh" data-action="back-to-order" data-id="'+tableId+'">&#x2190; Back</button>';
  h+='<button class="btn btn-g" style="flex:1;font-size:14px;" id="pay-btn" data-action="process-payment" data-id="'+tableId+'">&#x2705; COLLECT PAYMENT</button>';
  h+='</div>';
  showModal(h,'460px');

  S._payMethod='cash';
}

function buildReceiptHTML(opts){
  /* opts: {title, items:[{name,qty,price}], subtotal, gst, gstPct, delivery, discount, total,
             orderId, date, customer, payment, tableId, note, amtPaid, change, payMethod, type} */

  var h='<div style="font-family:Courier New,Courier,monospace;width:100%;max-width:302px;margin:0 auto;background:#fff;color:#000;font-size:12px;">';

  h+='<div style="color:rgba(255,255,255,.8);font-size:10px;margin-top:2px;">'+esc2(s.address)+'</div>';
  h+='<div style="color:rgba(255,255,255,.7);font-size:10px;">Tel: '+esc2(s.phone)+'</div>';
  h+='</div>';
  /* Sub-header */
  h+='<div style="background:#e04800;padding:5px 10px;text-align:center;">';

  h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="color:#555;font-size:11px;">Subtotal</span><span style="font-size:11px;">'+rs(opts.subtotal||opts.total)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#555;font-size:11px;">GST ('+(opts.gstPct||17)+'%)</span><span style="font-size:11px;">'+rs(opts.gst)+'</span></div>';
  if(opts.paidTotal&&opts.paidTotal<opts.total){
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="color:green;font-size:11px;">Previously Paid</span><span style="color:green;font-size:11px;font-weight:bold;">- '+rs(opts.paidTotal)+'</span></div>';
